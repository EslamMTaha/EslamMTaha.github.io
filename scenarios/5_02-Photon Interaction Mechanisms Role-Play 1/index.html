<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>5.02-Photon Interaction Mechanisms Role-Play 1</title>
<style>
  :root {
    --green:#166534; --green-mid:#15803d; --gold:#ca8a04; --gold-dark:#b45309;
    --bg:#0f172a; --panel:#1e293b; --border:#334155; --text:#f1f5f9;
    --red:#dc2626; --red-bg:#7f1d1d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .app { max-width: 980px; margin: 0 auto; padding: 16px; }
  .start, .end, .stage { background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .start, .end { padding: 28px; text-align: center; }
  h1 { color: #fff; margin: 0 0 8px; font-size: 26px; }
  .muted { color:#94a3b8; font-size: 13px; }
  .stage { position: relative; }
  .scene-frame {
    position: relative;
    width: 100%; aspect-ratio: 16 / 10;
    background-position: center; background-size: cover; background-color:#0f172a;
    overflow: hidden;
  }
  .character {
    position: absolute; bottom: 0; height: 95%;
    transition: opacity 0.3s;
  }
  .character.left  { left: 4%; }
  .character.right { right: 4%; }
  .character.center { left: 50%; transform: translateX(-50%); }
  .character img { height: 100%; width: auto; max-width: 100%; }
  .score-pill {
    position: absolute; top: 12px; right: 12px;
    background: rgba(15,23,42,0.85); color:#fff; padding: 6px 14px;
    border-radius: 18px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border);
  }
  .speech-bubble {
    position: absolute; left: 4%; right: 4%; bottom: 12px;
    background: rgba(255,255,255,0.96); color: #0f172a;
    border-radius: 14px; padding: 14px 18px; max-height: 45%; overflow-y: auto;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35); font-size: 15px; line-height: 1.45;
  }
  .speech-bubble p { margin: 0; }
  .voice-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #e2e8f0;
    font-size: 11px; color: #64748b;
  }
  .voice-btn {
    background: var(--green); color:#fff; border:none; border-radius: 14px;
    padding: 4px 12px; font-size: 11px; cursor: pointer;
  }
  .voice-btn:hover { background: var(--green-mid); }
  .replies { padding: 16px 18px 18px; background: var(--panel); display: flex;
    flex-direction: column; gap: 10px; }
  .reply {
    background: #334155; color:#fff; border: 1.5px solid transparent;
    border-radius: 10px; padding: 12px 14px; text-align: left;
    cursor: pointer; font-size: 14px; line-height: 1.4; font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .reply:hover { background: #475569; border-color: var(--gold); }
  .reply.continue { background: var(--green); text-align: center; font-weight: 600; }
  .reply.continue:hover { background: var(--green-mid); }
  .reply p { margin: 0; }
  input[type=text] { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit;
    background: #0f172a; color: var(--text); }
  input[type=text]:focus { outline: none; border-color: var(--green); }
  button.primary {
    background: var(--green); color:#fff; border:none; border-radius: 8px;
    padding: 11px 26px; font-size: 14px; font-weight: 600; cursor:pointer;
  }
  button.primary:hover { background: var(--green-mid); }
  button.primary:disabled { background: #475569; cursor: not-allowed; }
  .err { color: #fee2e2; background: var(--red-bg); border-left: 4px solid var(--red);
    padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 13px; }
  .ok { color: #dcfce7; background: #14532d; border-left: 4px solid #22c55e;
    padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 13px; }
  .hidden { display: none !important; }
  .badge-pass { background: var(--green); }
  .badge-fail { background: var(--red); }
  .badge {
    display: inline-block; color:#fff; padding: 6px 18px; border-radius: 16px;
    font-weight: 600; font-size: 15px; margin-top: 8px;
  }
  .score-big { font-size: 56px; font-weight: 700; line-height: 1; color: #fff; }
  .footer { color:#475569; font-size: 11px; text-align:center; margin-top: 22px; line-height: 1.5; }
  @media (max-width: 600px) {
    .speech-bubble { font-size: 13px; padding: 10px 12px; max-height: 50%; }
    .reply { font-size: 13px; padding: 10px 12px; }
    h1 { font-size: 20px; }
  }
</style>
</head>

<div class="app">

  <!-- ── Start page ─────────────────────────────────────────────── -->
  <div id="start" class="start">
    <h1 id="title-h">5.02-Photon Interaction Mechanisms Role-Play 1</h1>
    <p class="muted" id="intro-meta"></p>
    <hr style="border:none; border-top:1px solid var(--border); margin: 18px 0;">

    <div style="margin-top: 16px;">
      <button class="primary" id="start-btn">Begin Scenario →</button>
    </div>
  </div>

  <!-- ── Scene stage ────────────────────────────────────────────── -->
  <div id="stage" class="stage hidden">
    <div class="scene-frame" id="scene-frame">
      <div class="score-pill" id="score-pill">Score: 0</div>

        </div>
      </div>
    </div>
    <div class="replies" id="replies"></div>
  </div>

  <!-- ── End page ───────────────────────────────────────────────── -->
  <div id="end" class="end hidden">
    <h1 id="end-title">Scenario Complete</h1>
    <div class="score-big" id="end-score">0</div>
    <div class="muted" id="end-of"></div>
    <div id="end-badge"></div>
    <p id="end-msg" style="margin-top: 18px; line-height: 1.5;"></p>
    <hr style="border:none; border-top:1px solid var(--border); margin: 18px 0;">
    <div id="submit-area">
      <div id="submit-status" class="muted" style="font-size:13px;">Sending your results…</div>
      <button class="primary hidden" id="submit-btn" style="margin-top:10px;">Retry Send</button>
    </div>
  </div>

  <audio id="voice-audio"></audio>

  <div class="footer">
    © <span id="year"></span> Developed by Eslam Taha — CTRP, King Abdulaziz University, Jeddah.
  </div>
</div>

function _b64dec(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
function _decode() {
  const c = _b64dec(__SC_CIPHER), k = _b64dec(__SC_KEY);
  const p = new Uint8Array(c.length);
  for (let i = 0; i < c.length; i++) p[i] = c[i] ^ k[i % k.length];
  return JSON.parse(new TextDecoder('utf-8').decode(p));
}

// ── Voice playback (file OR browser TTS) ─────────────────────────────
// Unified handle so terminal-scene logic can wait for either to finish
// regardless of which kind of narration this scene uses.
const voicePlayer = {
  _endHandlers: [],
  onEnd(cb) { this._endHandlers.push(cb); },
  _fire() {
    const hs = this._endHandlers; this._endHandlers = [];
    hs.forEach(h => { try { h(); } catch (e) {} });
  },
  stop() {
    try { audio.pause(); } catch (e) {}
    audio.onended = null;
    audio.removeAttribute('src');
    if (window.speechSynthesis) { try { speechSynthesis.cancel(); } catch (e) {} }
    this._endHandlers = [];
  },
  playFile(src, statusEl) {
    audio.src = src;
    audio.onended = () => this._fire();
    if (voiceUnlocked) {
      audio.play().then(() => { statusEl.textContent = "Playing…"; })
        .catch(() => { statusEl.textContent = "Tap to listen"; });
    } else {
      statusEl.textContent = "Tap to listen";
    }
  },
  playTts(text, lang, statusEl) {
    if (!window.speechSynthesis) {
      statusEl.textContent = "Browser TTS not supported here";
      // Fire 'end' so terminal scenes don't lock up the Finish button
      setTimeout(() => this._fire(), 0);
      return;
    }
    const u = new SpeechSynthesisUtterance(text || "");
    u.lang = lang || "en-US";
    u.onend = () => this._fire();
    u.onerror = () => this._fire();
    statusEl.textContent = voiceUnlocked ? "Speaking…" : "Tap to listen";
    if (voiceUnlocked) {
      try { speechSynthesis.speak(u); }
      catch (e) { setTimeout(() => this._fire(), 0); }
    }
  }
};

    } else {
      voicePlayer.playFile(__ASSET_BASE + sc.voice, status);
    }
  }
});

function start() {
  const name = document.getElementById('student-name').value.trim();
  if (!name) { document.getElementById('start-err').classList.remove('hidden'); return; }
  studentName = name;
  startTs = Date.now();
  voiceUnlocked = true;  // user just clicked — autoplay now permitted
  document.getElementById('start').classList.add('hidden');
  document.getElementById('stage').classList.remove('hidden');
  showScene(currentSceneId);
}

function renderRich(html) {
  if (!html) return "";
  // iSpring stores text as either CDATA HTML or double-encoded HTML.
  // The converter already does one unescape pass; here we strip Flash-era
  // wrapping tags that the browser ignores anyway but keep paragraph structure.
  let s = html;
  // <TEXTFORMAT ...> wrappers — drop them
  s = s.replace(/<\/?TEXTFORMAT[^>]*>/gi, '');
  // <P ALIGN="LEFT"> → <p style="text-align:left">
  s = s.replace(/<P ALIGN="([^"]*)"[^>]*>/gi, '<p style="text-align:$1">');
  s = s.replace(/<\/P>/gi, '</p>');
  // <FONT FACE=... SIZE=...> — drop (we have our own font)
  s = s.replace(/<\/?FONT[^>]*>/gi, '');
  return s;
}

function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<[^>]+>/g, '').replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ')
    .replace(/&apos;/g,"'").replace(/&quot;/g,'"').trim();
}

function showScene(sceneId) {
  const scene = SC.scenes[sceneId];
  if (!scene) {
    console.error('Missing scene:', sceneId);
    finish();
    return;
  }
  currentSceneId = sceneId;

  // Background — inherit if blank
  const bg = scene.background_id ? SC.backgrounds[scene.background_id] : null;
  const bgUrl = bg ? (__ASSET_BASE + bg) : lastBgUrl;
  if (bgUrl) {
    document.getElementById('scene-frame').style.backgroundImage = "url('" + bgUrl + "')";
    lastBgUrl = bgUrl;
  } else {
    document.getElementById('scene-frame').style.backgroundImage = "";
  }

  // Character — inherits from previous scene when this scene has
  // { inherit: true } (briefings, terminal commentary, wrong-answer messages).
  const charHost = document.getElementById('char-host');
  const charImg  = document.getElementById('char-img');
  const ch = scene.character;
  if (ch && ch.inherit) {
    // Leave whatever character/emotion is currently visible
  } else if (ch && ch.id && SC.characters[ch.id]) {
    const charDef = SC.characters[ch.id];
    const imgRel = charDef.emotions[ch.emotion] || Object.values(charDef.emotions)[0];
    if (imgRel) {
      charImg.src = __ASSET_BASE + imgRel;
      charHost.className = "character " + (ch.position || "right");
      charHost.classList.remove('hidden');
    } else {
      charHost.classList.add('hidden');
    }
  } else {
    // ch === null  →  scene had no <character> tag at all  →  hide
    charHost.classList.add('hidden');
  }

  // Speech
  document.getElementById('speech-text').innerHTML = renderRich(scene.text || "");

  // Voice — file path (MP3/WAV) or "tts:lang:text" pseudo-URL
  const voiceRow = document.getElementById('voice-row');
  const voiceStatus = document.getElementById('voice-status');
  voicePlayer.stop();  // halt any prior narration before starting this scene's
  if (scene.voice) {
    voiceRow.classList.remove('hidden');
    if (scene.voice.indexOf('tts:') === 0) {
      const rest = scene.voice.slice(4);
      const colonIdx = rest.indexOf(':');
      const lang = (colonIdx >= 0) ? rest.slice(0, colonIdx) : 'en-US';
      const text = (colonIdx >= 0) ? rest.slice(colonIdx + 1) : rest;
      voicePlayer.playTts(text, lang, voiceStatus);
    } else {
      voicePlayer.playFile(__ASSET_BASE + scene.voice, voiceStatus);
    }
  } else {
    voiceRow.classList.add('hidden');
  }

  // Replies
  const repliesEl = document.getElementById('replies');
  repliesEl.innerHTML = '';
  const replies = scene.replies || [];

  if (replies.length === 0) {
    // Terminal scene — let the student finish reading/listening, then they
    // click Finish themselves. If there's a voiceover, the button stays
    // disabled until the audio finishes so it can't be missed.
    const btn = document.createElement('button');
    btn.className = 'reply continue';
    btn.textContent = 'Finish Scenario →';
    btn.addEventListener('click', finish);
    repliesEl.appendChild(btn);
    if (scene.voice) {
      btn.disabled = true;
      btn.style.opacity = '0.55';
      btn.textContent = 'Listen, then continue…';
      voicePlayer.onEnd(() => {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = 'Finish Scenario →';
      });
    }
    return;
  }

  // If a single reply with no text → "Continue" button
  if (replies.length === 1 && !replies[0].text) {
    const r = replies[0];
    const btn = document.createElement('button');
    btn.className = 'reply continue';
    btn.textContent = 'Continue →';
    btn.addEventListener('click', () => onReply(r));
    repliesEl.appendChild(btn);
    return;
  }

  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'reply';
    btn.innerHTML = renderRich(r.text || "");
    btn.addEventListener('click', () => onReply(r));
    repliesEl.appendChild(btn);
  });
}

function onReply(reply) {
  const delta = parseInt(reply.score || 0, 10) || 0;
  score += delta;
  path.push({
    scene_id: currentSceneId,
    reply_text: stripHtml(reply.text || '').slice(0, 200),
    score_delta: delta,
    score_after: score,
  });
  document.getElementById('score-pill').textContent = "Score: " + score;
  if (reply.next_scene_id) {
    showScene(reply.next_scene_id);
  } else {
    finish();
  }
}

function finish() {
  document.getElementById('stage').classList.add('hidden');
  document.getElementById('end').classList.remove('hidden');
  if (!audio.paused) { try { audio.pause(); } catch (e) {} }

  const passing = SC.raw_passing_score;
  const passed = (passing != null) ? (score >= passing) : null;

  document.getElementById('end-score').textContent = score;
  document.getElementById('end-of').textContent =
    (passing != null) ? ("of " + passing + " needed to pass") : "";
  const badgeEl = document.getElementById('end-badge');
  if (passed === true) {
    badgeEl.innerHTML = '<span class="badge badge-pass">✓ Passed</span>';
    document.getElementById('end-msg').textContent =
      "Well done — you handled the scenario effectively.";
  } else if (passed === false) {
    badgeEl.innerHTML = '<span class="badge badge-fail">✗ Did Not Pass</span>';
    document.getElementById('end-msg').textContent =
      "Review the material and try again. Each choice matters.";
  }

  submitResults();
}

// ── Submission ────────────────────────────────────────────────────────
function buildPayload() {
  const totalSecs = Math.max(1, Math.round((Date.now() - startTs) / 1000));
  return {
    type: "scenario",
    student_name: studentName,
    scenario_title: SC.title || "",
    submitted_at: new Date().toISOString(),
    score: score,
    raw_passing_score: SC.raw_passing_score ?? null,
    passed: (SC.raw_passing_score != null) ? (score >= SC.raw_passing_score) : null,
    time_seconds: totalSecs,
    path: path,
  };
}

function submitResults() {
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('submit-status');
  btn.classList.add('hidden');
  btn.disabled = true;
  status.innerHTML = '<span style="opacity:0.7">⏳ Sending your results…</span>';
  const payload = buildPayload();
  if (!__WEBHOOK_URL) {
    status.innerHTML = '<span class="err">No webhook configured.</span>'
      + '<pre style="font-size:11px; max-height:200px; overflow:auto; background:#0f172a; padding:8px; border-radius:4px; text-align:left;">'
      + JSON.stringify(payload, null, 2).replace(/</g,'&lt;') + '</pre>';
    return;
  }
  fetch(__WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
  }).then(() => {
    document.getElementById('submit-area').innerHTML =
      '<div class="ok">✔ Your results have been sent. You may close this page.</div>';
  }).catch((err) => {
    status.innerHTML = '<span class="err">Could not send: ' + String(err)
      + '<br>Check your internet and tap Retry, or screenshot this page and send to your instructor.</span>';
    btn.classList.remove('hidden');
    btn.disabled = false;
  });
}
</script>
