<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Radiation Shield Game | RadLab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f7fa;color:#222;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0;gap:8px}
#game-content{display:flex;flex-direction:column;align-items:center;padding:8px 10px;gap:8px;width:100%}
#topbar{width:900px;display:flex;align-items:center;gap:14px;background:white;border:1px solid #ddd;padding:8px 14px;border-radius:8px;flex-shrink:0}
#hearts{flex:1;font-size:24px;letter-spacing:2px}
.hf{color:#e53935}.he{color:#ccc}
.statbox{font-size:10px;font-weight:bold;letter-spacing:1px;color:#1a237e;text-align:center;min-width:64px}
.statbox span{display:block;font-size:21px;color:#222;font-weight:bold}
#streakbox span{color:#e65100}
#streakbox.hot span{color:#bf360c;text-shadow:none}
#progbox{flex:1;text-align:right;font-size:10px;color:#555}
#progbar{height:5px;background:#e8eaf0;border-radius:3px;margin-top:4px;overflow:hidden}
#progfill{height:100%;background:linear-gradient(90deg,#1565c0,#42a5f5);border-radius:3px;transition:width 0.4s}
canvas{display:block;border:2px solid #1a237e;border-radius:6px}
#infobar{width:900px;min-height:54px;display:flex;align-items:center;gap:12px;background:white;border:1px solid #ddd;padding:8px 14px;border-radius:6px}
#psym{font-size:34px;font-weight:bold;min-width:44px;text-align:center;line-height:1;text-shadow:0 0 10px currentColor}
#pinfo{flex:1}
#pname{font-size:14px;font-weight:bold;color:#1a237e}
#phint{font-size:11px;color:#555;margin-top:2px}
#msg{font-size:13px;font-weight:bold;text-align:center;flex:2;min-height:18px;line-height:1.4}
#layerlbl{font-size:11px;color:#1a237e;font-weight:bold;min-width:90px;text-align:right}
#inventory{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;width:900px}
.sBtn{position:relative;width:118px;height:72px;border-radius:8px;border:2px solid;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform 0.08s,filter 0.08s,box-shadow 0.1s;user-select:none;padding:4px}
.sBtn:hover:not([disabled]){transform:translateY(-3px);filter:brightness(1.3)}
.sBtn:active:not([disabled]){transform:none;filter:brightness(0.8)}
.sBtn[disabled]{opacity:0.18;cursor:not-allowed}
.sBtn .sName{font-size:13px;font-weight:bold}
.sBtn .sCnt{font-size:12px;font-family:monospace;opacity:0.8}
.sBtn .sHint{font-size:9px;opacity:0.7;text-align:center;line-height:1.3;padding:0 2px}
.sBtn .sKey{position:absolute;top:3px;left:5px;font-size:9px;opacity:0.4}
#wcBtn{background:linear-gradient(135deg,#b8860b,#ffd700,#b8860b)!important;border-color:#ff8c00!important;color:#1a0a00!important;box-shadow:0 0 12px rgba(255,180,0,0.6);animation:wcPulse 1.5s infinite alternate}
@keyframes wcPulse{from{box-shadow:0 0 8px rgba(255,180,0,0.5)}to{box-shadow:0 0 20px rgba(255,200,0,0.9)}}
#startBtn{padding:10px 40px;font-size:15px;font-weight:bold;background:#1a237e;color:white;border:none;border-radius:8px;cursor:pointer;letter-spacing:1px}
#startBtn:hover{background:#3949ab}
#kbhint{font-size:10px;color:#555;text-align:center}
#refillNote{font-size:11px;color:#1a237e;text-align:center;min-height:16px}
</style>
</head>
<body>

<div id="game-content">

<div id="topbar">
  <div id="hearts"></div>
  <div class="statbox">SCORE<span id="scoreVal">0</span></div>
  <div class="statbox" id="streakbox">STREAK<span id="streakVal">0</span></div>
  <div class="statbox">LEVEL<span id="levelVal">1</span></div>
  <div id="progbox">Next level<div id="progbar"><div id="progfill" style="width:0%"></div></div></div>
</div>

<canvas id="cv" width="900" height="260"></canvas>

<div id="infobar">
  <span id="psym" style="color:#888">?</span>
  <div id="pinfo">
    <div id="pname">Waiting…</div>
    <div id="phint"></div>
  </div>
  <div id="msg" style="color:#e65100">Press START to play!</div>
  <div id="layerlbl"></div>
</div>

<div id="inventory"></div>
<div id="refillNote"></div>
<button id="startBtn">START GAME</button>
<div id="kbhint">Keys: 1=Paper &nbsp;2=Plastic &nbsp;3=Water &nbsp;4=Lead &nbsp;5=Boron &nbsp;6=Cadmium &nbsp;7=Wildcard</div>

</div>

<script>
/* ===================== PHYSICS ===================== */
var PDEF = {
  alpha:         { name:'Alpha Particle',  sym:'α',  color:'#ef5350', glow:'#b71c1c', r:16, shape:'ball', hint:'Heavy, +2 charge — very short range, easily stopped' },
  beta:          { name:'Beta Particle',   sym:'β⁻', color:'#42a5f5', glow:'#0d47a1', r:9,  shape:'ball', hint:'Fast electron — use LOW-Z material (caution: produces X-rays!)' },
  gamma:         { name:'Gamma Ray',       sym:'γ',  color:'#ffee58', glow:'#f57f17', r:0,  shape:'wave', hint:'EM radiation — needs dense, high-Z shielding' },
  xray:          { name:'X-Ray',           sym:'X',  color:'#ce93d8', glow:'#6a1b9a', r:0,  shape:'wave', hint:'Like gamma, lower energy — dense material required' },
  'slow-neutron':{ name:'Slow Neutron',    sym:'nₛ', color:'#b0bec5', glow:'#546e7a', r:11, shape:'ball', hint:'Thermal neutron — absorbed by specific nuclei', tag:'SLOW' },
  'fast-neutron':{ name:'Fast Neutron',    sym:'nᶠ', color:'#78909c', glow:'#263238', r:14, shape:'ball', hint:'High-energy neutron — must SLOW it down first!', tag:'FAST' }
};

// shield -> secondary or null (particle stopped)
var RULES = {
  'alpha':         { paper:null, plastic:null, water:null, lead:null },
  'beta':          { plastic:'xray', water:'xray' },
  'gamma':         { lead:null },
  'xray':          { lead:null },
  'slow-neutron':  { boron:null, cadmium:'gamma' },
  'fast-neutron':  { plastic:'slow-neutron', water:'slow-neutron' }
};

// What shields each particle type needs (for provisioning)
var NEEDS = {
  alpha:          ['paper','plastic','water','lead'],
  beta:           ['plastic','water','lead'],
  gamma:          ['lead'],
  xray:           ['lead'],
  'slow-neutron': ['boron','cadmium','lead'],
  'fast-neutron': ['plastic','water','boron','cadmium','lead']
};

var MSGS = {
  'alpha:paper':        'Paper stops the alpha! Charged particles have very short range.',
  'alpha:plastic':      'Plastic easily stops this alpha particle.',
  'alpha:water':        'Water stops alpha — good range to spare.',
  'alpha:lead':         'Lead stops alpha — effective but heavy for such a weak particle!',
  'beta:plastic':       'Plastic stops beta — but bremsstrahlung X-rays were produced!',
  'beta:water':         'Water stops beta — but X-rays were produced! Shield again!',
  'gamma:lead':         'Lead attenuates the gamma ray. Well shielded.',
  'xray:lead':          'Lead absorbs the X-ray perfectly.',
  'slow-neutron:boron': 'Boron-10 captures the neutron! Alpha released, self-absorbed.',
  'slow-neutron:cadmium':'Cadmium absorbs the neutron — but emits capture gamma! Shield again!',
  'fast-neutron:plastic':'Plastic moderates the fast neutron — now it\'s thermal!',
  'fast-neutron:water': 'Water moderates the fast neutron — now it\'s slow!'
};

// Shield materials (+wildcard)
var SDEF = [
  { id:'paper',    label:'Paper',    color:'#f0eed0', textColor:'#333', border:'#c8c060', hint:'Stops α' },
  { id:'plastic',  label:'Plastic',  color:'#0288d1', textColor:'#fff', border:'#01579b', hint:'Stops β, moderates n' },
  { id:'water',    label:'Water',    color:'#26c6da', textColor:'#003', border:'#00838f', hint:'Stops β, moderates n' },
  { id:'lead',     label:'Lead',     color:'#546e7a', textColor:'#fff', border:'#263238', hint:'Stops γ, X-ray' },
  { id:'boron',    label:'Boron',    color:'#388e3c', textColor:'#fff', border:'#1b5e20', hint:'Absorbs slow n' },
  { id:'cadmium',  label:'Cadmium',  color:'#f9a825', textColor:'#222', border:'#e65100', hint:'Absorbs slow n (emits γ!)' },
  { id:'wildcard', label:'⭐ Wild',  color:'#ffd700', textColor:'#1a0a00', border:'#ff8c00', hint:'Stops ANY particle! No secondary.' }
];

// Levels — quota 3 so player advances quickly and sees variety sooner
var LEVELS = [
  { types:['alpha'],                                              speed:80,  quota:3 },
  { types:['alpha','beta'],                                       speed:108, quota:3 },
  { types:['alpha','beta','gamma'],                               speed:138, quota:3 },
  { types:['alpha','beta','gamma','slow-neutron'],                speed:172, quota:4 },
  { types:['alpha','beta','gamma','slow-neutron','fast-neutron'], speed:210, quota:4 }
];
function lcfg(lv){ return LEVELS[Math.min(lv-1,LEVELS.length-1)]; }

// Shields added to inventory when reaching a new level
var LEVEL_BONUS = {
  2: {plastic:2, lead:2},
  3: {lead:2},
  4: {boron:3, cadmium:2, lead:2},
  5: {plastic:2, water:1, boron:2, cadmium:1, lead:2}
};

/* ===================== CANVAS ===================== */
var CW=900, CH=260, GUN_X=70, PLY_X=840, PY=130, PSTART=115, PHIT=815;
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();
  };
}

/* ===================== GAME STATE ===================== */
var G={};
function freshInv(){
  // Start with only what alpha/beta need; boron/cadmium unlocked at level 4
  return {paper:3, plastic:3, water:2, lead:3, boron:0, cadmium:0, wildcard:0};
}

function initG(){
  G={
    phase:'title', round:'idle',
    hearts:3, score:0, level:1, quota:0, totalStopped:0,
    streak:0, bestStreak:0,
    particle:null, shields:[], inv:freshInv(),
    flash:0, successFlash:0, muzzle:0, waveT:0,
    trail:[], impact:null, popups:[], cdTimer:0
  };
}

/* ===================== INVENTORY HELPERS ===================== */
function canHandle(type){
  if(G.inv.wildcard>0) return true;
  var rules=RULES[type];
  if(!rules) return true;
  for(var m in rules) if(G.inv[m]>0) return true;
  return false;
}

function pickParticleType(){
  var cfg=lcfg(G.level);
  var types=cfg.types;
  // try up to 8 times to find a type player has shields for
  for(var i=0;i<8;i++){
    var t=types[Math.floor(Math.random()*types.length)];
    if(canHandle(t)) return t;
  }
  // fallback: emergency add 1 needed shield
  var t=types[Math.floor(Math.random()*types.length)];
  emergencyAdd(t);
  return t;
}

function emergencyAdd(type){
  var needs=NEEDS[type]||[];
  if(needs.length===0) return;
  var m=needs[Math.floor(Math.random()*needs.length)];
  G.inv[m]=(G.inv[m]||0)+1;
  showRefillNote('Low on shields — emergency '+capFirst(m)+' added!');
}

function periodicRefill(){
  // Every 3 successful stops: add 1-2 shields relevant to current level
  if(G.totalStopped>0 && G.totalStopped%3===0){
    var cfg=lcfg(G.level);
    var pool=[];
    cfg.types.forEach(function(t){ (NEEDS[t]||[]).forEach(function(m){ if(pool.indexOf(m)<0) pool.push(m); }); });
    shuffle(pool);
    var added=[];
    for(var i=0;i<Math.min(2,pool.length);i++){
      G.inv[pool[i]]=(G.inv[pool[i]]||0)+1;
      added.push(capFirst(pool[i]));
    }
    if(added.length) showRefillNote('Supply drop: +1 '+added.join(', +1 '));
  }
}

function applyLevelBonus(lv){
  var bonus=LEVEL_BONUS[lv];
  if(!bonus) return;
  var added=[];
  for(var m in bonus){
    G.inv[m]=(G.inv[m]||0)+bonus[m];
    added.push(bonus[m]+' '+capFirst(m));
  }
  if(added.length) showRefillNote('Level up bonus: +'+added.join(', +'));
}

function grantStreakReward(){
  // Every 3 consecutive correct shields = 1 wildcard
  if(G.streak>0 && G.streak%3===0){
    G.inv.wildcard=(G.inv.wildcard||0)+1;
    G.popups.push({text:'🌟 WILDCARD!',x:CW/2,y:PY-90,life:100,color:'#ffd700'});
    showRefillNote('Streak x'+G.streak+' — Wildcard shield awarded!');
    document.getElementById('streakbox').classList.add('hot');
  }
}

function showRefillNote(txt){
  var el=document.getElementById('refillNote');
  el.textContent=txt;
  if(G._refillTimer) clearTimeout(G._refillTimer);
  G._refillTimer=setTimeout(function(){el.textContent='';},3500);
}

function capFirst(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} }

/* ===================== DRAWING ===================== */
function drawBg(){
  var g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#050510');g.addColorStop(1,'#080a1a');
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(80,80,200,0.04)';ctx.lineWidth=1;
  for(var y=0;y<CH;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  for(var x=0;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,0.012)';
  ctx.fillRect(GUN_X,PY-32,PLY_X-GUN_X,64);
  ctx.strokeStyle='rgba(100,200,255,0.07)';ctx.lineWidth=1;
  ctx.setLineDash([6,10]);
  ctx.beginPath();ctx.moveTo(GUN_X,PY-32);ctx.lineTo(PLY_X,PY-32);ctx.stroke();
  ctx.beginPath();ctx.moveTo(GUN_X,PY+32);ctx.lineTo(PLY_X,PY+32);ctx.stroke();
  ctx.setLineDash([]);
}

function drawGun(){
  ctx.save();ctx.translate(GUN_X,PY);
  ctx.fillStyle='#37474f';
  ctx.beginPath();ctx.roundRect(-42,-24,52,48,5);ctx.fill();
  ctx.strokeStyle='#546e7a';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#455a64';ctx.fillRect(8,-9,38,18);
  ctx.strokeStyle='#607d8b';ctx.lineWidth=1;ctx.strokeRect(8,-9,38,18);
  var mf=G.muzzle/200;
  if(mf>0){
    var gr=ctx.createRadialGradient(46,0,0,46,0,28);
    gr.addColorStop(0,'rgba(255,180,30,'+mf+')');gr.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(46,0,28,0,2*Math.PI);ctx.fill();
  }
  ctx.fillStyle=mf>0?'rgba(255,255,255,0.8)':'#546e7a';
  ctx.beginPath();ctx.arc(46,0,9,0,2*Math.PI);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-32,-20);ctx.lineTo(8,-9);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-32,20);ctx.lineTo(8,9);ctx.stroke();
  ctx.restore();
}

function drawPlayer(){
  ctx.save();ctx.translate(PLY_X,PY);
  var t=Math.min(G.flash/250,1);
  var sr=Math.round(55+t*190),sg=Math.round(75-t*60),sb=Math.round(95-t*80);
  var br=Math.round(180+t*75),bg2=Math.round(160-t*120),bb=Math.round(130-t*100);
  ctx.fillStyle='rgb('+sr+','+sg+','+sb+')';
  ctx.beginPath();ctx.roundRect(-15,-42,30,52,5);ctx.fill();
  ctx.fillStyle='rgb('+br+','+bg2+','+bb+')';
  ctx.beginPath();ctx.arc(0,-56,17,0,2*Math.PI);ctx.fill();
  ctx.fillStyle='rgba(80,200,255,0.55)';
  ctx.beginPath();ctx.ellipse(0,-55,11,7,0,Math.PI,2*Math.PI);ctx.fill();
  var lr=Math.round(sr*0.7),lg=Math.round(sg*0.7),lbb=Math.round(sb*0.7);
  ctx.fillStyle='rgb('+lr+','+lg+','+lbb+')';
  ctx.fillRect(-14,10,12,40);ctx.fillRect(2,10,12,40);
  ctx.fillRect(-27,-38,12,34);ctx.fillRect(15,-38,12,34);
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(0,-56,17,0,2*Math.PI);ctx.stroke();
  ctx.restore();
}

function drawShields(){
  for(var i=0;i<G.shields.length;i++){
    var sh=G.shields[i];
    var sd=null;
    for(var j=0;j<SDEF.length;j++) if(SDEF[j].id===sh.mat){sd=SDEF[j];break;}
    if(!sd) continue;
    var x=sh.x;
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(x-12+2,PY-58+2,24,116);
    ctx.fillStyle=sd.color;
    ctx.beginPath();ctx.roundRect(x-12,PY-58,24,116,4);ctx.fill();
    ctx.strokeStyle=sd.border;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(x-12,PY-58,24,116,4);ctx.stroke();
    ctx.save();ctx.translate(x,PY);ctx.rotate(-Math.PI/2);
    ctx.fillStyle=sd.textColor;ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText(sd.label,0,4);ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='bold 8px Arial';ctx.textAlign='center';
    ctx.fillText('L'+(i+1),x,PY-62);
  }
}

function drawParticle(){
  var p=G.particle;
  if(!p) return;
  var def=PDEF[p.type];
  if(!def) return;
  if(def.shape==='ball'){
    for(var i=0;i<G.trail.length;i++){
      ctx.globalAlpha=G.trail[i].a*0.32;
      ctx.fillStyle=def.color;
      ctx.beginPath();ctx.arc(G.trail[i].x,PY,def.r*0.55,0,2*Math.PI);ctx.fill();
    }
    ctx.globalAlpha=1;
    var gr=ctx.createRadialGradient(p.x,PY,0,p.x,PY,def.r*3);
    gr.addColorStop(0,def.color+'88');gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(p.x,PY,def.r*3,0,2*Math.PI);ctx.fill();
    var cg=ctx.createRadialGradient(p.x-def.r*0.35,PY-def.r*0.35,0,p.x,PY,def.r);
    cg.addColorStop(0,'#fff');cg.addColorStop(0.3,def.color);cg.addColorStop(1,def.glow);
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(p.x,PY,def.r,0,2*Math.PI);ctx.fill();
    ctx.fillStyle='white';ctx.font='bold '+Math.max(7,def.r-2)+'px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(def.sym,p.x,PY);ctx.textBaseline='alphabetic';
    if(def.tag){
      ctx.fillStyle=def.color;ctx.font='bold 7px Arial';ctx.textAlign='center';
      ctx.fillText(def.tag,p.x,PY-def.r-5);
    }
  } else {
    drawWave(p.x,def);
  }
}

function drawWave(x,def){
  var wl=28,amp=12,waves=4;
  ctx.strokeStyle=def.color;ctx.lineWidth=2.5;
  ctx.shadowColor=def.color;ctx.shadowBlur=10;
  ctx.beginPath();var first=true;
  for(var i=0;i<=waves*wl;i+=2){
    var wx=x-waves*wl+i;
    if(wx<PSTART-5) continue;
    var wy=PY+amp*Math.sin((i+G.waveT*0.18)*2*Math.PI/wl);
    if(first){ctx.moveTo(wx,wy);first=false;}else ctx.lineTo(wx,wy);
  }
  ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=def.color;
  ctx.beginPath();ctx.moveTo(x+12,PY);ctx.lineTo(x,PY-8);ctx.lineTo(x,PY+8);ctx.closePath();ctx.fill();
  ctx.fillStyle=def.color;ctx.font='bold 15px Arial';ctx.textAlign='center';
  ctx.shadowColor=def.color;ctx.shadowBlur=6;
  ctx.fillText(def.sym,x,PY-22);ctx.shadowBlur=0;
}

function drawImpact(){
  if(!G.impact) return;
  var a=G.impact.t/300,r=45*(1-G.impact.t/300)+8;
  var gr=ctx.createRadialGradient(G.impact.x,PY,0,G.impact.x,PY,r);
  gr.addColorStop(0,'rgba(255,240,180,'+a+')');gr.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(G.impact.x,PY,r,0,2*Math.PI);ctx.fill();
}

function drawFlashes(){
  if(G.flash>0){ctx.fillStyle='rgba(220,0,0,'+(G.flash/400*0.55)+')';ctx.fillRect(0,0,CW,CH);}
  if(G.successFlash>0){ctx.fillStyle='rgba(0,200,80,'+(G.successFlash/300*0.28)+')';ctx.fillRect(0,0,CW,CH);}
}

function drawPopups(){
  for(var i=0;i<G.popups.length;i++){
    var p=G.popups[i];
    ctx.globalAlpha=Math.min(p.life/40,1);
    ctx.fillStyle=p.color;ctx.font='bold 15px Arial';ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.globalAlpha=1;
}

function drawOverlay(){
  if(G.phase==='title'){
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#42a5f5';ctx.font='bold 34px Arial';ctx.textAlign='center';
    ctx.fillText('☢ RADIATION SHIELD',CW/2,CH/2-46);
    ctx.fillStyle='#fff';ctx.font='14px Arial';
    ctx.fillText('A particle is fired at you — pick the correct shielding material before it hits!',CW/2,CH/2-4);
    ctx.fillStyle='#aaa';ctx.font='12px Arial';
    ctx.fillText('Some particles need multiple shield layers. Inventory is limited — use it wisely.',CW/2,CH/2+22);
    ctx.fillText('Build a streak to earn wildcard shields ⭐ that stop any particle!',CW/2,CH/2+46);
  }
  if(G.phase==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#e53935';ctx.font='bold 42px Arial';ctx.textAlign='center';
    ctx.fillText('IRRADIATED!',CW/2,CH/2-32);
    ctx.fillStyle='#ffd54f';ctx.font='22px Arial';
    ctx.fillText('Final Score: '+G.score,CW/2,CH/2+14);
    ctx.fillStyle='#aaa';ctx.font='13px Arial';
    ctx.fillText('Best streak: '+G.bestStreak+' in a row   |   Press RESTART to try again',CW/2,CH/2+48);
  }
  if(G.round==='countdown'){
    var sec=Math.ceil(G.cdTimer/1000);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 36px Arial';ctx.textAlign='center';
    ctx.fillText(sec||'►',CW/2,CH/2+8);
  }
}

function draw(){
  ctx.clearRect(0,0,CW,CH);
  drawBg();drawShields();drawGun();drawPlayer();
  if(G.round==='incoming'&&G.particle) drawParticle();
  drawImpact();drawFlashes();drawPopups();drawOverlay();
}

/* ===================== GAME LOGIC ===================== */
function startGame(){
  initG();G.phase='playing';
  updateUI();schedNext(600);
}

function schedNext(delay){G.round='countdown';G.cdTimer=delay;}

function spawnParticle(){
  var type=pickParticleType();
  var cfg=lcfg(G.level);
  var spd=cfg.speed+Math.max(0,G.level-LEVELS.length)*28;
  G.particle={type:type,x:PSTART,speed:spd};
  G.shields=[];G.trail=[];
  G.round='incoming';G.muzzle=200;
  updateParticleHUD(type);setMsg('');updateUI();
}

function applyShield(mat){
  if(G.round!=='incoming') return;
  if(!(G.inv[mat]>0)) return;
  var type=G.particle.type;
  var sx=G.particle.x;

  // Wildcard: stops anything, no secondary
  if(mat==='wildcard'){
    G.inv.wildcard--;
    G.shields.push({mat:'wildcard',x:sx});
    G.impact={x:sx,t:300};G.successFlash=200;
    var pts=15+G.shields.length*5;
    G.score+=pts;G.quota++;G.totalStopped++;G.streak++;
    if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    G.popups.push({text:'+'+pts+' WILDCARD!',x:sx,y:PY-72,life:70,color:'#ffd700'});
    setMsg('⭐ Wildcard absorbed the '+PDEF[type].name+'!','#ffd700');
    G.round='paused';
    grantStreakReward();
    updateLayerLabel();updateUI();
    var cfg=lcfg(G.level);
    if(G.quota>=cfg.quota){
      var lv=G.level+1;G.level=lv;G.quota=0;
      applyLevelBonus(lv);
      setTimeout(function(){setMsg('⬆ LEVEL '+G.level+'! New shields added.','#ffee58');updateUI();schedNext(2200);},1100);
    } else {
      setTimeout(function(){schedNext(1200);},800);
    }
    return;
  }

  var rules=RULES[type];
  if(!rules||!(mat in rules)){
    // wrong shield
    var sLabel='';
    for(var i=0;i<SDEF.length;i++) if(SDEF[i].id===mat){sLabel=SDEF[i].label;break;}
    setMsg('✗ '+sLabel+' does NOT stop '+PDEF[type].name+'!','#ef5350');
    G.streak=0;document.getElementById('streakbox').classList.remove('hot');
    triggerHit();return;
  }

  // Valid shield
  var secondary=rules[mat];
  G.inv[mat]--;
  G.shields.push({mat:mat,x:sx});
  G.impact={x:sx,t:300};G.successFlash=200;
  var mkey=type+':'+mat;
  var fback=MSGS[mkey]||'Shield applied!';

  if(secondary===null){
    var pts2=10+G.shields.length*5;
    G.score+=pts2;G.quota++;G.totalStopped++;G.streak++;
    if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    G.popups.push({text:'+'+pts2,x:sx,y:PY-72,life:60,color:'#69f0ae'});
    setMsg('✓ '+fback,'#69f0ae');
    G.round='paused';
    grantStreakReward();
    periodicRefill();
    updateLayerLabel();updateUI();
    var cfg2=lcfg(G.level);
    if(G.quota>=cfg2.quota){
      var lv2=G.level+1;G.level=lv2;G.quota=0;
      applyLevelBonus(lv2);
      setTimeout(function(){setMsg('⬆ LEVEL '+G.level+'! Speed up. New shields in inventory.','#ffee58');updateUI();schedNext(2200);},1100);
    } else {
      setTimeout(function(){schedNext(1200);},800);
    }
  } else {
    setMsg('⚠ '+fback,'#ffd54f');
    G.round='paused';
    updateLayerLabel();updateUI();
    var capSec=secondary, capSpd=G.particle.speed;
    setTimeout(function(){
      // Give player enough time: at least 2.5 s reaction
      var safeStart=Math.min(sx+15, PHIT-capSpd*2.5);
      if(safeStart<PSTART) safeStart=PSTART;
      G.particle.type=capSec;G.particle.x=safeStart;G.trail=[];
      G.round='incoming';
      updateParticleHUD(capSec);updateUI();
    },820);
  }
}

function triggerHit(){
  if(G.round==='hit') return;
  G.round='hit';G.hearts--;G.flash=500;updateUI();
  if(G.hearts<=0){
    setTimeout(function(){G.phase='gameover';document.getElementById('startBtn').textContent='RESTART';updateUI();},1600);
  } else {
    setTimeout(function(){schedNext(1400);},1200);
  }
}

/* ===================== GAME LOOP ===================== */
var lastTs=0;
function loop(ts){
  var dt=Math.min(ts-lastTs,50);lastTs=ts;
  if(G.phase==='playing'){
    if(G.round==='countdown'){G.cdTimer-=dt;if(G.cdTimer<=0) spawnParticle();}
    if(G.round==='incoming'&&G.particle){
      G.particle.x+=G.particle.speed*dt/1000;
      G.waveT+=dt;G.muzzle=Math.max(0,G.muzzle-dt);
      G.trail.push({x:G.particle.x,a:1});
      if(G.trail.length>14) G.trail.shift();
      for(var i=0;i<G.trail.length;i++) G.trail[i].a*=0.82;
      if(G.particle.x>=PHIT){
        setMsg('☢ The '+PDEF[G.particle.type].name+' hit you!','#ef5350');
        G.streak=0;document.getElementById('streakbox').classList.remove('hot');
        triggerHit();
      }
    }
    G.flash=Math.max(0,G.flash-dt);G.successFlash=Math.max(0,G.successFlash-dt);
    if(G.impact){G.impact.t-=dt;if(G.impact.t<=0)G.impact=null;}
    for(var i=G.popups.length-1;i>=0;i--){
      G.popups[i].life-=1;G.popups[i].y-=0.5;
      if(G.popups[i].life<=0) G.popups.splice(i,1);
    }
  }
  draw();requestAnimationFrame(loop);
}

/* ===================== UI ===================== */
function updateParticleHUD(type){
  var def=PDEF[type];
  document.getElementById('psym').textContent=def.sym;
  document.getElementById('psym').style.color=def.color;
  document.getElementById('pname').textContent=def.name;
  document.getElementById('pname').style.color=def.color;
  document.getElementById('phint').textContent=def.hint;
  updateLayerLabel();
}
function updateLayerLabel(){
  var n=G.shields?G.shields.length:0;
  document.getElementById('layerlbl').textContent=n>0?'Layer '+n+' placed':'';
}
function setMsg(t,c){
  document.getElementById('msg').textContent=t;
  document.getElementById('msg').style.color=c||'#ffd54f';
}
function updateUI(){
  // hearts
  var h='';for(var i=0;i<3;i++) h+='<span class="heart '+(i<G.hearts?'hf':'he')+'">&#10084;</span>';
  document.getElementById('hearts').innerHTML=h;
  document.getElementById('scoreVal').textContent=G.score;
  document.getElementById('streakVal').textContent=G.streak;
  document.getElementById('levelVal').textContent=G.level;
  var cfg=lcfg(G.level);
  document.getElementById('progfill').style.width=Math.round(G.quota/cfg.quota*100)+'%';
  renderInv();
}
function renderInv(){
  var div=document.getElementById('inventory');div.innerHTML='';
  for(var i=0;i<SDEF.length;i++){
    var sd=SDEF[i];
    var cnt=G.inv[sd.id]||0;
    var btn=document.createElement('button');
    btn.className='sBtn';
    if(sd.id==='wildcard') btn.id='wcBtn';
    btn.style.background=sd.color;
    btn.style.color=sd.textColor;
    btn.style.borderColor=sd.border;
    btn.disabled=cnt===0;
    btn.innerHTML='<span class="sKey">'+(i+1)+'</span>'
      +'<span class="sName">'+sd.label+'</span>'
      +'<span class="sCnt">×'+cnt+'</span>'
      +'<span class="sHint">'+sd.hint+'</span>';
    (function(id){btn.addEventListener('click',function(){applyShield(id);});})(sd.id);
    div.appendChild(btn);
  }
}

/* ===================== KEYBOARD ===================== */
document.addEventListener('keydown',function(e){
  var idx=parseInt(e.key)-1;
  if(idx>=0&&idx<SDEF.length) applyShield(SDEF[idx].id);
});
document.getElementById('startBtn').addEventListener('click',function(){
  if(G.phase==='title'||G.phase==='gameover') startGame();
});

/* ===================== INIT ===================== */
initG();renderInv();requestAnimationFrame(loop);
</script>
