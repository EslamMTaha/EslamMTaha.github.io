<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Battle 2</title>
<style>
  :root {
    --green:#166534; --green-mid:#15803d;
    --gold:#ca8a04; --gold-dark:#b45309;
    --bg:#f8fafc; --bg2:#dcfce7; --surface:#ffffff;
    --border:#e2e8f0; --border-mid:#cbd5e1;
    --text:#0f172a; --muted:#64748b;
    --red:#991b1b; --red-bg:#fee2e2;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 18px 22px 60px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:26px; box-shadow: 0 1px 3px rgba(15,23,42,0.06); margin-bottom:16px; }
  h1 { color: var(--green); margin: 8px 0 6px; font-size: 28px; text-align:center; }
  h2 { margin: 0 0 12px; font-size: 19px; }
  .muted { color:var(--muted); font-size: 14px; }
  .ctrp-logo { height: 72px; width: auto; display: block; margin: 0 auto 12px; }
  .hidden { display: none !important; }

  label.fld { display:block; font-weight:600; margin: 14px 0 6px; }
  input[type=text], input[type=number], select {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border-mid);
    border-radius: 9px; font-size: 16px; font-family: inherit; background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s; }
  input:focus, select:focus { outline: none; border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(22,101,52,0.12); }
  .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
  .check-row { display:flex; align-items:center; gap:10px; margin-top: 14px;
    font-size: 15px; }
  .check-row input { width: 18px; height: 18px; accent-color: var(--green); }

  button.primary {
    background: var(--green); color:#fff; border:none; border-radius: 10px;
    padding: 13px 32px; font-size: 16px; font-weight: 600; cursor:pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  button.primary:hover { background: var(--green-mid); box-shadow: 0 2px 8px rgba(22,101,52,0.25); }
  button.primary:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }

  /* Score pills */
  .pills { display:flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill {
    color:#fff; border-radius: 12px; padding: 8px 18px; font-weight: 700;
    font-size: 17px; border: 3px solid transparent; min-width: 130px; text-align:center;
  }
  .pill.active { border-color: #fbbf24; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .pill .streak { display:block; font-size: 12px; font-weight: 600; opacity: 0.95; }

  .turn-banner { font-size: 15px; font-weight: 700; padding: 6px 14px;
    border-radius: 8px; color:#fff; display:inline-block; margin-bottom: 10px; }
  .timer-big { font-size: 22px; font-weight: 700; color: var(--gold);
    font-variant-numeric: tabular-nums; float:right; }
  .timer-big.warn { color: #b91c1c; }

  .qtext { background: #fff; border-left: 4px solid var(--gold);
    border-radius: 0 10px 10px 0; padding: 14px 18px; line-height: 1.5;
    font-size: 19px; margin: 12px 0 16px; border-top: 1px solid var(--border);
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .qtext img { max-width: 100%; height: auto; vertical-align: middle; }

  .choices { display:flex; flex-direction:column; gap:10px; margin: 10px 0 16px; }
  .bchoice {
    box-sizing: border-box; border: 2px solid var(--border-mid);
    background:var(--surface); border-radius:12px;
    padding: 14px 16px; cursor: pointer; font-size: 17px; line-height: 1.4;
    text-align: left; font-family: inherit; width: 100%;
    transition: border-color 0.15s, background 0.15s;
  }
  .bchoice:hover { border-color: var(--green-mid); }
  .bchoice.selected { border-color: var(--green); background: var(--bg2); }
  .bchoice.correct  { border-color: var(--green); background: var(--bg2); }
  .bchoice.wrong    { border-color: #dc2626; background: var(--red-bg); }
  .bchoice:disabled { cursor: default; opacity: 0.9; }
  .bchoice p { margin: 0; }

  .feedback { padding: 13px 16px; border-radius: 0 10px 10px 0; font-size: 16px;
    font-weight: 600; margin: 10px 0; border-left-width: 5px; border-left-style: solid; }
  .feedback.good { color:#166534; background:#dcfce7; border-left-color:#166534; }
  .feedback.bad  { color:#991b1b; background:#fee2e2; border-left-color:#991b1b; }
  .feedback.timeout { color:#92400e; background:#fef3c7; border-left-color:#f59e0b; }
  .feedback.retry { color:#0891b2; background:#e0f2fe; border-left-color:#0891b2; }
  .feedback.early { color:#1e3a8a; background:#dbeafe; border-left-color:#2563eb; }

  /* Splash */
  .splash { text-align: center; padding: 60px 20px; }
  .splash .swords { font-size: 56px; }
  .splash h2 { font-size: 34px; margin: 12px 0 6px; }
  .splash .score-note { color: var(--muted); font-size: 16px; margin-bottom: 26px; }

  /* Results */
  .rescard { display:flex; align-items:center; gap: 16px; border-radius: 14px;
    padding: 18px 22px; margin-bottom: 12px; border: 2px solid var(--border); }
  .rescard.winner { border-width: 3px; }
  .rescard .medal { font-size: 34px; width: 46px; }
  .rescard .tname { font-size: 20px; font-weight: 700; flex: 1; }
  .rescard .tscore { font-size: 26px; font-weight: 800; }
  .bar-track { flex: 2; background: #e5e7eb; height: 12px; border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; }

  /* Team setup cards (icon + color pickers) */
  .team-card { border: 1px solid var(--border); border-left-width: 5px;
    border-radius: 12px; padding: 14px 16px; margin-top: 14px; background: var(--surface); }
  .team-card .fld { margin-top: 0; }
  .picker-label { font-size: 13px; color: var(--muted); font-weight: 600;
    margin: 10px 0 6px; }
  .icon-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .icon-grid button {
    width: 38px; height: 38px; font-size: 21px; line-height: 1;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 9px; cursor: pointer; padding: 0;
    transition: border-color 0.12s, transform 0.12s;
  }
  .icon-grid button:hover { border-color: var(--border-mid); transform: scale(1.12); }
  .icon-grid button.sel { border-color: var(--green); background: var(--bg2); }
  .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch-row button {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; padding: 0;
    transition: transform 0.12s, border-color 0.12s;
  }
  .swatch-row button:hover { transform: scale(1.15); }
  .swatch-row button.sel { border-color: #0f172a; }
  .pill .ticon { font-size: 19px; margin-right: 5px; }
  .splash .sp-icon { font-size: 60px; line-height: 1; }

  /* Wildcards */
  .wc-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
    margin-bottom: 20px; }
  .wc-btn { color:#fff; border:none; border-radius:10px; padding: 12px 18px;
    font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
    transition: filter 0.15s, box-shadow 0.15s; }
  .wc-btn:hover { filter: brightness(1.12); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .wc-btn small { display:block; font-weight:500; font-size:11px; opacity:0.92;
    margin-top:2px; }
  .pill .wc { display:block; font-size: 13px; font-weight: 600; margin-top: 2px; }
  .wc-badge { background:#fef3c7; color:#92400e; border-radius:8px;
    padding: 4px 10px; font-size: 13px; font-weight:700; margin-left: 8px; }

  .footer { color:#888; font-size: 11px; text-align:center; margin-top: 24px; line-height: 1.5; }
  .err { color: var(--red); background: var(--red-bg); border-left: 4px solid var(--red);
    padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 14px; }

  /* Presentation controls (top of game view) */
  .ctrl-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    margin-bottom: 12px; }
  .ctrl-bar .spacer { flex: 1; }
  .ctrl-btn { background: var(--surface); border: 1px solid var(--border-mid);
    color: var(--text); border-radius: 8px; padding: 6px 12px; font-size: 13px;
    cursor: pointer; font-family: inherit; }
  .ctrl-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
  .ctrl-btn.on { background: var(--bg2); border-color: var(--green); color: var(--green); }

  /* Animated timer bar */
  .timer-wrap { margin: 6px 0 14px; }
  .timer-track { background: var(--border); height: 12px; border-radius: 6px;
    overflow: hidden; }
  .timer-fill { height: 100%; width: 100%; border-radius: 6px;
    background: var(--green); transition: width 0.95s linear, background 0.3s; }

  /* Teacher controls panel */
  .teacher { border: 1px dashed var(--border-mid); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 14px; background: #fbfdff; }
  .teacher .th-title { font-size: 12px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.4px; margin-bottom: 8px; }
  .teacher .th-teams { display:flex; gap:10px; flex-wrap:wrap; }
  .th-team { display:flex; align-items:center; gap:6px; border:1px solid var(--border);
    border-radius: 8px; padding: 4px 8px; }
  .th-team .tn { font-size:13px; font-weight:600; }
  .th-adj { width:26px; height:26px; border-radius:6px; border:1px solid var(--border-mid);
    background: var(--surface); cursor:pointer; font-size:15px; font-weight:700; line-height:1;
    padding:0; }
  .th-adj:hover { background:#f1f5f9; }
  .th-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

  /* Target picker (steal/freeze on 3 teams) */
  .target-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
    margin: 4px 0 18px; }
  .target-btn { color:#fff; border:none; border-radius:10px; padding:12px 20px;
    font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
  .target-btn:hover { filter: brightness(1.12); }

  /* Review screen */
  .rev-q { border:1px solid var(--border); border-radius:12px; padding:14px 16px;
    margin-bottom: 12px; background: var(--surface); }
  .rev-q.qwrong { border-left: 5px solid #dc2626; }
  .rev-q.qright { border-left: 5px solid #16a34a; }
  .rev-meta { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .rev-qtext { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .rev-opt { font-size: 14px; padding: 4px 0; }
  .rev-opt.ok { color: #166534; font-weight: 700; }
  .rev-opt.picked-wrong { color: #991b1b; text-decoration: line-through; }

  /* Confetti overlay */
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

  /* Big / presentation text mode */
  body.big .qtext    { font-size: 26px; }
  body.big .bchoice  { font-size: 23px; padding: 18px 20px; }
  body.big .pill     { font-size: 22px; }
  body.big .turn-banner { font-size: 20px; }
  body.big h1        { font-size: 36px; }
  body.big .splash h2 { font-size: 44px; }
  body.big .app      { max-width: 1100px; }

  @media (max-width: 560px) {
    .app { padding: 12px 12px 50px; }
    .card { padding: 16px; }
    .grid2 { grid-template-columns: 1fr; }
    .qtext { font-size: 16px; }
    .bchoice { font-size: 15px; padding: 12px 13px; }
    .pill { font-size: 14px; min-width: 100px; padding: 6px 12px; }
    .splash h2 { font-size: 26px; }
  }
</style>
</head>

    <h1>Team Battle 2</h1>
    <p class="muted" style="text-align:center;">⚔ Team Battle — set up the match, then take turns on this screen.</p>
    <hr style="border:none; border-top:1px solid var(--border); margin: 18px 0;">

    <div class="grid2">
      <div>
        <label class="fld">Number of teams</label>
        <select id="s-teams">
          <option value="2" selected>2 teams</option>
          <option value="3">3 teams</option>
        </select>
      </div>
      <div>
        <label class="fld">Time per question (seconds, 0 = none)</label>
        <input type="number" id="s-time" value="30" min="0" max="300">
      </div>
    </div>

    <div id="teams-host"></div>

    <label class="fld">Questions per team</label>
    <input type="number" id="s-qper" value="5" min="1" max="50">
    <div class="muted" id="s-pool" style="margin-top:6px;"></div>

    <div class="check-row">
      <input type="checkbox" id="s-streak" checked>
      <label for="s-streak">🔥 Streak bonus — 2+ correct in a row earns +1 extra point</label>
    </div>

    <label class="fld" style="margin-top:18px;">Wildcards (each team gets one of each enabled type)</label>
    <div id="s-wildcards"></div>

    <div id="s-err" class="err hidden"></div>
    <div style="margin-top: 20px; text-align:center;">
      <button class="primary" id="s-start">⚔ &nbsp;Start Battle!</button>
    </div>
  </div>

  <!-- ── Splash ─────────────────────────────────────────────────── -->
  <div id="splash" class="card splash hidden">
    <div class="swords sp-icon" id="sp-icon">⚔</div>
    <h2 id="sp-name"></h2>
    <div class="score-note" id="sp-score"></div>
    <div id="sp-wc-hdr" class="hidden" style="font-weight:700; margin-bottom:12px;">
      Use a wildcard for this question?
    </div>
    <div id="sp-wc-row" class="wc-row"></div>
    <div id="sp-target-hdr" class="hidden" style="font-weight:700; margin:6px 0 4px;"></div>
    <div id="sp-target-row" class="target-row"></div>
    <button class="primary" id="sp-go">Ready — show the question →</button>
  </div>

  <!-- ── Game ───────────────────────────────────────────────────── -->
  <div id="game" class="card hidden">
    <div class="ctrl-bar">
      <button class="ctrl-btn" id="fs-btn" title="Toggle fullscreen (F)">⛶ Fullscreen</button>
      <button class="ctrl-btn" id="big-btn" title="Bigger text for projector">A+ Larger text</button>
      <button class="ctrl-btn" id="snd-btn" title="Toggle sound">🔊 Sound</button>
      <span class="spacer"></span>
      <button class="ctrl-btn" id="teach-btn" title="Show teacher controls">🎛 Teacher</button>
    </div>

    <div class="teacher hidden" id="teacher">
      <div class="th-title">TEACHER CONTROLS</div>
      <div class="th-teams" id="th-teams"></div>
      <div class="th-actions">
        <button class="ctrl-btn" id="th-change">🔀 Change question</button>
        <button class="ctrl-btn" id="th-undo" disabled>↩ Undo last scoring</button>
      </div>
    </div>

    <div class="pills" id="pills"></div>
    <div>
      <span class="turn-banner" id="turn-banner"></span>
      <span class="timer-big hidden" id="timer"></span>
      <span class="muted" style="float:right; margin: 6px 12px 0 0;" id="q-progress"></span>
    </div>
    <div style="clear:both;"></div>
    <div class="timer-wrap hidden" id="timer-wrap">
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    </div>
    <div class="qtext" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div id="feedback" class="feedback hidden"></div>
    <div style="text-align:right;">
      <button class="primary" id="submit-btn">Submit Answer</button>
    </div>
  </div>

function renderRich(html) {
  if (!html) return "";
  let s = html;
  if (/^\s*<!doctype|^\s*<html/i.test(s)) {
    const m = s.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    if (m) s = m[1];
  }
  s = s.replace(/font-family\s*:\s*[^;'"<>]+;?/gi, '')
       .replace(/font-size\s*:\s*[\d.]+\s*(?:pt|px|em|rem|%)\s*;?/gi, '');
  return s;
}
function stripHtml(h) {
  if (!h) return '';
  return h.replace(/<[^>]+>/g, '').replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();
}

// ── Sound (Web Audio — no asset files) ───────────────────────────────
let _actx = null;
function audioCtx() {
  if (!_actx) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  return _actx;
}
function tone(freq, start, dur, type, gain) {
  const ac = audioCtx(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  o.connect(g); g.connect(ac.destination);
  const t0 = ac.currentTime + start;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain || 0.2, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sfx(kind) {
  if (!soundOn) return;
  if (kind === 'correct')      { tone(660, 0, 0.12, 'sine'); tone(990, 0.10, 0.18, 'sine'); }
  else if (kind === 'wrong')   { tone(200, 0, 0.32, 'sawtooth', 0.15); }
  else if (kind === 'tick')    { tone(880, 0, 0.05, 'square', 0.08); }
  else if (kind === 'timeout') { tone(300, 0, 0.20, 'triangle', 0.15); tone(220, 0.18, 0.28, 'triangle', 0.15); }
  else if (kind === 'fanfare') { [523,659,784,1047].forEach((f,i)=>tone(f, i*0.13, 0.22, 'sine', 0.22)); }
}

// ── Confetti ─────────────────────────────────────────────────────────
function confettiBurst(colors) {
  const cv = document.getElementById('confetti');
  cv.classList.remove('hidden');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const N = 140;
  const parts = [];
  for (let i = 0; i < N; i++) {
    parts.push({
      x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.4,
      vx: (Math.random() - 0.5) * 3, vy: 2 + Math.random() * 4,
      s: 5 + Math.random() * 7, rot: Math.random() * 6.28, vr: (Math.random()-0.5)*0.3,
      c: colors[i % colors.length],
    });
  }
  let frame = 0;
  (function anim() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    parts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c; ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s*0.6); ctx.restore();
    });
    frame++;
    if (frame < 200) requestAnimationFrame(anim);
    else cv.classList.add('hidden');
  })();
}

  // Never hijack keys while the user is typing in a field (e.g. team names
  // on the setup screen — otherwise 'f' would toggle fullscreen mid-word).
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'select' || tag === 'textarea') return;
  if (document.getElementById('game').classList.contains('hidden')) {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();

    e.preventDefault();
    if (!answered) onSubmit();
    return;
  }
  if (answered) return;
  let idx = -1;
  const k = e.key.toLowerCase();
  if (k >= 'a' && k <= 'z') idx = k.charCodeAt(0) - 97;
  else if (k >= '1' && k <= '9') idx = parseInt(k, 10) - 1;
  const btns = document.querySelectorAll('#choices .bchoice');
  if (idx >= 0 && idx < btns.length) { e.preventDefault(); btns[idx].click(); }

// ── Setup → sequence ─────────────────────────────────────────────────
function startBattle() {
  numTeams  = parseInt(document.getElementById('s-teams').value, 10);
  timePerQ  = Math.max(0, parseInt(document.getElementById('s-time').value, 10) || 0);
  qPerTeam  = Math.max(1, parseInt(document.getElementById('s-qper').value, 10) || 5);
  streakBonus = document.getElementById('s-streak').checked;
  names = []; icons = []; teamColors = [];
  for (let t = 0; t < numTeams; t++) {
    names.push((teamCfg[t].name || '').trim() || ('Team ' + (t + 1)));
    icons.push(teamCfg[t].icon || '⚔');
    teamColors.push(teamCfg[t].color || ACCENT[t] || '#2563eb');
  }
  const err = document.getElementById('s-err');
  if (POOL.length === 0) {
    err.textContent = 'This file contains no MCQ questions.';
    err.classList.remove('hidden');
    return;
  }
  const needed = numTeams * qPerTeam;
  if (needed > POOL.length &&
      !confirm('This battle needs ' + needed + ' questions but the pool has only '
               + POOL.length + '. Some questions will repeat. Continue?')) {
    return;
  }
  err.classList.add('hidden');

  // Round-robin sequence with disjoint per-team slices (repeat-fill if short)
  let all = shuffle(POOL.slice());
  while (all.length < needed) all = all.concat(shuffle(POOL.slice()));
  const perTeam = [];
  for (let t = 0; t < numTeams; t++) perTeam.push(all.slice(t * qPerTeam, (t + 1) * qPerTeam));
  seq = [];
  for (let qi = 0; qi < qPerTeam; qi++)
    for (let t = 0; t < numTeams; t++)
      seq.push([t, perTeam[t][qi]]);

  scores = new Array(numTeams).fill(0);
  streaks = new Array(numTeams).fill(0);
  freezeNext = new Array(numTeams).fill(false);
  // One of each enabled wildcard per team. Freeze is useless with no timer —
  // drop it so a team can't waste the pick (mirrors the desktop rule).
  let enabled = WILDCARDS.filter(w => document.getElementById('s-wc-' + w.id).checked)
                         .map(w => w.id);
  if (timePerQ <= 0) enabled = enabled.filter(id => id !== 'freeze');
  wcInventory = [];
  for (let t = 0; t < numTeams; t++) {
    const inv = {};
    enabled.forEach(id => { inv[id] = 1; });
    wcInventory.push(inv);
  }
  cur = 0;
  battleActive = true;
  outcomes = [];
  scoreSnapshot = null;
  document.getElementById('th-undo').disabled = true;
  renderTeacherPanel();

  document.getElementById('setup').classList.add('hidden');
  showSplash(0);
}

// Snapshot for one-level undo. wcCtx (from record) also lets undo cancel a
// freeze cast this turn and hand back the wildcard the team spent. Manual
// teacher +/- passes no context, so it only reverts the numeric change.
function snapshotScores(wcCtx) {
  scoreSnapshot = {
    scores: scores.slice(),
    streaks: streaks.slice(),
    freezeNext: freezeNext.slice(),   // captured before applyFreeze() runs
    wc: wcCtx ? wcCtx.wc : null,
    wcTeam: wcCtx ? wcCtx.team : -1,
  };
  document.getElementById('th-undo').disabled = false;
}
function teacherAdjust(team, delta) {
  snapshotScores();
  scores[team] = Math.max(0, scores[team] + delta);
  renderPills();
}
document.getElementById('th-undo').addEventListener('click', () => {
  if (!scoreSnapshot) return;
  scores = scoreSnapshot.scores.slice();
  streaks = scoreSnapshot.streaks.slice();
  freezeNext = scoreSnapshot.freezeNext.slice();   // undo a freeze cast that turn
  if (scoreSnapshot.wc && scoreSnapshot.wcTeam >= 0) {
    const inv = wcInventory[scoreSnapshot.wcTeam] || (wcInventory[scoreSnapshot.wcTeam] = {});
    inv[scoreSnapshot.wc] = (inv[scoreSnapshot.wc] || 0) + 1;   // hand the wildcard back
  }
  scoreSnapshot = null;
  document.getElementById('th-undo').disabled = true;
  renderPills();
  renderTeacherPanel();
});
document.getElementById('th-change').addEventListener('click', () => {
  if (answered || document.getElementById('game').classList.contains('hidden')) return;
  // Swap the current question for a fresh one, preferring an unused question.
  const usedTexts = new Set(seq.slice(0, cur + 1).map(x => x[1].text)
    .concat(outcomes.map(o => o.q.text)));
  let candidates = POOL.filter(q => !usedTexts.has(q.text));
  if (candidates.length === 0) candidates = POOL.filter(q => q.text !== currentQ().text);
  if (candidates.length === 0) return;
  seq[cur][1] = candidates[Math.floor(Math.random() * candidates.length)];
  showQuestion();
});

function chooseWildcard(team, w) {
  // Consume from inventory
  wcInventory[team][w.id] -= 1;
  if (wcInventory[team][w.id] <= 0) delete wcInventory[team][w.id];
  activeWc = w.id;

  const opponents = [];
  for (let o = 0; o < numTeams; o++) if (o !== team) opponents.push(o);

  // Steal / Freeze need a target. One opponent → auto. Otherwise ask.
  if ((w.id === 'steal' || w.id === 'freeze') && opponents.length > 1) {
    // Hide the wildcard buttons; show the target chooser.
    document.getElementById('sp-wc-row').innerHTML = '';
    document.getElementById('sp-wc-hdr').classList.add('hidden');
    document.getElementById('sp-go').classList.add('hidden');
    const hdr = document.getElementById('sp-target-hdr');
    hdr.textContent = (w.id === 'steal' ? '🎯 Steal from which team?'
                                        : '❄ Freeze which team?');
    hdr.classList.remove('hidden');
    const trow = document.getElementById('sp-target-row');
    trow.innerHTML = '';
    opponents.forEach(o => {
      const tb = document.createElement('button');
      tb.className = 'target-btn';
      tb.style.background = teamColors[o];
      tb.textContent = icons[o] + ' ' + names[o];
      tb.addEventListener('click', () => {
        activeWcTarget = o;
        document.getElementById('sp-go').classList.remove('hidden');
        showQuestion();
      });
      trow.appendChild(tb);
    });
  } else {
    if (w.id === 'steal' || w.id === 'freeze') activeWcTarget = opponents[0];
    showQuestion();
  }
}

// ── Timer ────────────────────────────────────────────────────────────
function startTimer() {
  stopTimer();
  const el = document.getElementById('timer');
  const wrap = document.getElementById('timer-wrap');
  const fill = document.getElementById('timer-fill');
  if (timePerQ <= 0) { el.classList.add('hidden'); wrap.classList.add('hidden'); return; }
  const t = currentTeam();
  let base = timePerQ;
  // Consume a pending freeze once per turn; keep it applied on re-renders.
  if (freezeNext[t]) { freezeNext[t] = false; currentFrozen = true; }
  if (currentFrozen) base = Math.max(5, Math.floor(base / 2));
  const frozen = currentFrozen;
  timerBase = base;
  timerRem = base;
  const suffix = frozen ? ' ❄' : '';
  el.textContent = '⏱ ' + timerRem + 's' + suffix;
  el.classList.remove('hidden', 'warn');
  wrap.classList.remove('hidden');
  updateTimerBar(fill);
  timer = setInterval(() => {
    timerRem--;
    el.textContent = '⏱ ' + timerRem + 's' + suffix;
    el.classList.toggle('warn', timerRem <= 5);
    updateTimerBar(fill);
    if (timerRem <= 5 && timerRem > 0) sfx('tick');
    if (timerRem <= 0) { stopTimer(); record(true); }
  }, 1000);
}
function updateTimerBar(fill) {
  const pct = Math.max(0, Math.round(100 * timerRem / timerBase));
  fill.style.width = pct + '%';
  fill.style.background = timerRem <= 5 ? '#dc2626' : (timerRem <= timerBase * 0.4 ? '#ca8a04' : '#16a34a');
}
function stopTimer() {
  if (timer) { clearInterval(timer); timer = null; }
}

// ── Scoring ──────────────────────────────────────────────────────────
function onSubmit() {
  if (answered) return;
  record(false);
}

function correctHint(q) {
  const texts = (q.choices || []).filter(c => c.correct).map(c => stripHtml(c.text || ''));
  return texts.length ? ('  Correct: ' + texts.join(' / ')) : '';
}

function record(timedOut) {
  stopTimer();
  answered = true;
  const sb = document.getElementById('submit-btn');
  sb.disabled = true;
  const t = currentTeam(), q = currentQ();
  const fb = document.getElementById('feedback');
  const wc = activeWc;
  const isCorrect = !timedOut && selectedIdx >= 0 && !!(q.choices[selectedIdx] || {}).correct;

  // Second Chance retry — BEFORE any reveal. No correct-answer hint here:
  // showing the answer and then allowing a retry would be a free point.
  if (!timedOut && !isCorrect && wc === 'second' && !secondChanceUsed) {
    secondChanceUsed = true;
    answered = false;
    sb.disabled = false;
    sb.textContent = 'Try Again!';
    fb.className = 'feedback retry';
    fb.textContent = '🔄 Wrong — Second Chance!  Answer again to earn the point.';
    fb.classList.remove('hidden');
    startTimer();   // fresh timer for the retry
    return;
  }

  // Final outcome — now it's safe to reveal the marks
  const correctIdx = (q.choices || []).findIndex(c => c.correct);
  const btns = document.querySelectorAll('#choices .bchoice');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    else if (i === selectedIdx && !timedOut) b.classList.add('wrong');
  });

  // Log this question for the end-of-battle review
  outcomes.push({ team: t, q: q, selectedIdx: timedOut ? -1 : selectedIdx,
                  correct: isCorrect, timedOut: timedOut });
  // Snapshot for one-level undo — capture freezeNext BEFORE applyFreeze() and
  // record which wildcard this team spent so undo can return it.
  snapshotScores({ wc: wc, team: t });

  // Freeze / Steal target: the team the caster picked (activeWcTarget), else
  // fall back to the highest-scoring opponent.
  function highestOpponent() {
    let target = -1, best = -1;
    for (let o = 0; o < numTeams; o++)
      if (o !== t && scores[o] > best) { best = scores[o]; target = o; }
    return target;
  }
  function wcTarget() {
    return (activeWcTarget >= 0 && activeWcTarget !== t) ? activeWcTarget : highestOpponent();
  }
  function applyFreeze() {
    if (wc === 'freeze' && timePerQ > 0) {
      const target = wcTarget();
      if (target >= 0) freezeNext[target] = true;
    }
  }
  const freezeNote = (wc === 'freeze' && timePerQ > 0)
    ? ("  ❄ " + names[wcTarget()] + "'s next timer frozen!") : '';

  let msg = '', cls = '';
  if (timedOut) {
    applyFreeze();
    if (wc !== 'shield') streaks[t] = 0;
    cls = 'timeout';
    msg = "⏱ Time's up! No point for " + names[t] + '.' + correctHint(q) + freezeNote;
    sfx('timeout');
  } else if (isCorrect) {
    let earned = (wc === 'double') ? 2 : 1;
    streaks[t] += 1;
    let extra = (wc === 'double') ? '  ⭐ Double points!' : freezeNote;
    if (wc === 'steal') {
      const target = wcTarget();
      if (target >= 0 && scores[target] > 0) {
        scores[target] -= 1;
        extra = '  🎯 Stole 1 from ' + names[target] + '!';
      } else {
        extra = '  🎯 Steal — but ' + (target >= 0 ? names[target] : 'the target')
              + ' had no points to take.';
      }
    }
    applyFreeze();
    let streakMsg = '';
    if (streakBonus && streaks[t] >= 2) { earned += 1; streakMsg = '  🔥 Streak +1'; }
    scores[t] += earned;
    cls = 'good';
    msg = '✔ Correct!  +' + earned + ' for ' + names[t] + extra + streakMsg;
    sfx('correct');
  } else if (wc === 'second' && secondChanceUsed) {
    // The retry was also wrong
    streaks[t] = 0;
    cls = 'bad';
    msg = '✗ Wrong again.  No point for ' + names[t] + '.' + correctHint(q);
    sfx('wrong');
  } else {
    const shieldMsg = (wc === 'shield') ? '  🛡 Streak preserved!' : '';
    if (wc !== 'shield') streaks[t] = 0;
    applyFreeze();
    cls = 'bad';
    msg = (selectedIdx < 0 ? '✗ No answer selected. ' : '✗ Wrong! ')
        + 'No point for ' + names[t] + '.' + correctHint(q) + shieldMsg + freezeNote;
    sfx('wrong');
  }

  renderPills();
  renderTeacherPanel();
  fb.className = 'feedback ' + cls;
  fb.textContent = msg;
  fb.classList.remove('hidden');

  if (isOutcomeDecided()) {
    const leader = scores.indexOf(Math.max(...scores));
    setTimeout(() => {
      fb.className = 'feedback early';
      fb.textContent = '🏆 ' + names[leader] + ' cannot be caught — battle over!';
      setTimeout(finish, 2000);
    }, 2200);
  } else {
    setTimeout(advance, 2400);
  }
}

// Mirrors the desktop logic incl. the streak-aware catch-up bound.
function isOutcomeDecided() {
  // Wildcards can grant >1 pt per question (Double, Steal) — never call the
  // battle early while any team still holds one.
  if (wcInventory.some(inv => Object.keys(inv).length > 0)) return false;
  const maxScore = Math.max(...scores);
  if (maxScore === 0) return false;
  const leaders = scores.filter(s => s === maxScore).length;
  if (leaders !== 1) return false;
  const remaining = new Array(numTeams).fill(0);
  for (let i = cur + 1; i < seq.length; i++) remaining[seq[i][0]]++;
  if (!remaining.some(r => r > 0)) return false;
  const perQMax = streakBonus ? 2 : 1;
  for (let t = 0; t < numTeams; t++) {
    if (scores[t] < maxScore && scores[t] + remaining[t] * perQMax >= maxScore) return false;
  }
  return true;
}

function advance() {
  cur++;
  if (cur >= seq.length) { finish(); return; }
  if (seq[cur][0] !== seq[cur - 1][0]) showSplash(seq[cur][0]);
  else showQuestion();
}

// ── Results ──────────────────────────────────────────────────────────
function finish() {
  battleActive = false;
  document.getElementById('game').classList.add('hidden');
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  const maxScore = Math.max(...scores);
  const winners = [];
  scores.forEach((s, t) => { if (s === maxScore) winners.push(t); });
  document.getElementById('r-title').textContent =
    winners.length > 1 ? "🤝 It's a Tie!" : ('🏆 ' + names[winners[0]] + ' Wins!');

  // Celebrate
  sfx('fanfare');
  const confColors = winners.length === 1
    ? [teamColors[winners[0]], '#fbbf24', '#ffffff', teamColors[winners[0]]]
    : ['#fbbf24', '#22c55e', '#3b82f6', '#ec4899'];
  confettiBurst(confColors);

  const ranked = scores.map((s, t) => [t, s]).sort((a, b) => b[1] - a[1]);
  const medals = ['🥇', '🥈', '🥉'];
  const maxPossible = Math.max(1, qPerTeam * (streakBonus ? 2 : 1));
  const host = document.getElementById('r-cards');
  host.innerHTML = '';
  ranked.forEach(([t, s], rank) => {
    const card = document.createElement('div');
    card.className = 'rescard' + (s === maxScore ? ' winner' : '');
    card.style.borderColor = s === maxScore ? teamColors[t] : 'var(--border)';
    card.innerHTML =
      '<div class="medal">' + (medals[rank] || '') + '</div>' +
      '<div class="tname" style="color:' + teamColors[t] + '">' + icons[t] + ' ' + names[t] + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' +
        Math.min(100, Math.round(100 * s / maxPossible)) + '%; background:' + teamColors[t] + '"></div></div>' +
      '<div class="tscore" style="color:' + teamColors[t] + '">' + s + '</div>';
    host.appendChild(card);
  });
}

// ── Review ───────────────────────────────────────────────────────────
function showReview() {
  document.getElementById('results').classList.add('hidden');
  document.getElementById('review').classList.remove('hidden');
  const host = document.getElementById('rev-list');
  host.innerHTML = '';
  if (outcomes.length === 0) {
    host.innerHTML = '<p class="muted">No questions were played.</p>';
    return;
  }
  outcomes.forEach((o, n) => {
    const q = o.q;
    const div = document.createElement('div');
    div.className = 'rev-q ' + (o.correct ? 'qright' : 'qwrong');
    let opts = '';
    (q.choices || []).forEach((c, i) => {
      let cls = 'rev-opt';
      let mark = '';
      if (c.correct) { cls += ' ok'; mark = ' ✔'; }
      if (i === o.selectedIdx && !c.correct) { cls += ' picked-wrong'; mark = ' ✗ (their answer)'; }
      else if (i === o.selectedIdx && c.correct) { mark = ' ✔ (their answer)'; }
      opts += '<div class="' + cls + '">' + (i + 1) + '. ' + stripHtml(c.text || '') + mark + '</div>';
    });
    const verdict = o.timedOut ? '⏱ timed out'
                  : o.correct ? '✔ correct' : '✗ wrong';
    div.innerHTML =
      '<div class="rev-meta">Q' + (n + 1) + ' · ' + icons[o.team] + ' ' + names[o.team] +
        ' · <b style="color:' + (o.correct ? '#16a34a' : '#dc2626') + '">' + verdict + '</b></div>' +
      '<div class="rev-qtext">' + stripHtml(q.text || '') + '</div>' + opts;
    host.appendChild(div);
  });
}
</script>
