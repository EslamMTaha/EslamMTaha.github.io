<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Battle</title>
<style>
  :root {
    --green:#166534; --green-mid:#15803d;
    --gold:#ca8a04; --gold-dark:#b45309;
    --bg:#f8fafc; --bg2:#dcfce7; --surface:#ffffff;
    --border:#e2e8f0; --border-mid:#cbd5e1;
    --text:#0f172a; --muted:#64748b;
    --red:#991b1b; --red-bg:#fee2e2;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 18px 22px 60px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:26px; box-shadow: 0 1px 3px rgba(15,23,42,0.06); margin-bottom:16px; }
  h1 { color: var(--green); margin: 8px 0 6px; font-size: 28px; text-align:center; }
  h2 { margin: 0 0 12px; font-size: 19px; }
  .muted { color:var(--muted); font-size: 14px; }
  .ctrp-logo { height: 72px; width: auto; display: block; margin: 0 auto 12px; }
  .hidden { display: none !important; }

  label.fld { display:block; font-weight:600; margin: 14px 0 6px; }
  input[type=text], input[type=number], select {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border-mid);
    border-radius: 9px; font-size: 16px; font-family: inherit; background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s; }
  input:focus, select:focus { outline: none; border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(22,101,52,0.12); }
  .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
  .check-row { display:flex; align-items:center; gap:10px; margin-top: 14px;
    font-size: 15px; }
  .check-row input { width: 18px; height: 18px; accent-color: var(--green); }

  button.primary {
    background: var(--green); color:#fff; border:none; border-radius: 10px;
    padding: 13px 32px; font-size: 16px; font-weight: 600; cursor:pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  button.primary:hover { background: var(--green-mid); box-shadow: 0 2px 8px rgba(22,101,52,0.25); }
  button.primary:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }

  /* Score pills */
  .pills { display:flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill {
    color:#fff; border-radius: 12px; padding: 8px 18px; font-weight: 700;
    font-size: 17px; border: 3px solid transparent; min-width: 130px; text-align:center;
  }
  .pill.active { border-color: #fbbf24; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .pill .streak { display:block; font-size: 12px; font-weight: 600; opacity: 0.95; }

  .turn-banner { font-size: 15px; font-weight: 700; padding: 6px 14px;
    border-radius: 8px; color:#fff; display:inline-block; margin-bottom: 10px; }
  .timer-big { font-size: 22px; font-weight: 700; color: var(--gold);
    font-variant-numeric: tabular-nums; float:right; }
  .timer-big.warn { color: #b91c1c; }

  .qtext { background: #fff; border-left: 4px solid var(--gold);
    border-radius: 0 10px 10px 0; padding: 14px 18px; line-height: 1.5;
    font-size: 19px; margin: 12px 0 16px; border-top: 1px solid var(--border);
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .qtext img { max-width: 100%; height: auto; vertical-align: middle; }

  .choices { display:flex; flex-direction:column; gap:10px; margin: 10px 0 16px; }
  .bchoice {
    box-sizing: border-box; border: 2px solid var(--border-mid);
    background:var(--surface); border-radius:12px;
    padding: 14px 16px; cursor: pointer; font-size: 17px; line-height: 1.4;
    text-align: left; font-family: inherit; width: 100%;
    transition: border-color 0.15s, background 0.15s;
  }
  .bchoice:hover { border-color: var(--green-mid); }
  .bchoice.selected { border-color: var(--green); background: var(--bg2); }
  .bchoice.correct  { border-color: var(--green); background: var(--bg2); }
  .bchoice.wrong    { border-color: #dc2626; background: var(--red-bg); }
  .bchoice:disabled { cursor: default; opacity: 0.9; }
  .bchoice p { margin: 0; }

  .feedback { padding: 13px 16px; border-radius: 0 10px 10px 0; font-size: 16px;
    font-weight: 600; margin: 10px 0; border-left-width: 5px; border-left-style: solid; }
  .feedback.good { color:#166534; background:#dcfce7; border-left-color:#166534; }
  .feedback.bad  { color:#991b1b; background:#fee2e2; border-left-color:#991b1b; }
  .feedback.timeout { color:#92400e; background:#fef3c7; border-left-color:#f59e0b; }
  .feedback.retry { color:#0891b2; background:#e0f2fe; border-left-color:#0891b2; }
  .feedback.early { color:#1e3a8a; background:#dbeafe; border-left-color:#2563eb; }

  /* Splash */
  .splash { text-align: center; padding: 60px 20px; }
  .splash .swords { font-size: 56px; }
  .splash h2 { font-size: 34px; margin: 12px 0 6px; }
  .splash .score-note { color: var(--muted); font-size: 16px; margin-bottom: 26px; }

  /* Results */
  .rescard { display:flex; align-items:center; gap: 16px; border-radius: 14px;
    padding: 18px 22px; margin-bottom: 12px; border: 2px solid var(--border); }
  .rescard.winner { border-width: 3px; }
  .rescard .medal { font-size: 34px; width: 46px; }
  .rescard .tname { font-size: 20px; font-weight: 700; flex: 1; }
  .rescard .tscore { font-size: 26px; font-weight: 800; }
  .bar-track { flex: 2; background: #e5e7eb; height: 12px; border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; }

  /* Team setup cards (icon + color pickers) */
  .team-card { border: 1px solid var(--border); border-left-width: 5px;
    border-radius: 12px; padding: 14px 16px; margin-top: 14px; background: var(--surface); }
  .team-card .fld { margin-top: 0; }
  .picker-label { font-size: 13px; color: var(--muted); font-weight: 600;
    margin: 10px 0 6px; }
  .icon-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .icon-grid button {
    width: 38px; height: 38px; font-size: 21px; line-height: 1;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 9px; cursor: pointer; padding: 0;
    transition: border-color 0.12s, transform 0.12s;
  }
  .icon-grid button:hover { border-color: var(--border-mid); transform: scale(1.12); }
  .icon-grid button.sel { border-color: var(--green); background: var(--bg2); }
  .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch-row button {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; padding: 0;
    transition: transform 0.12s, border-color 0.12s;
  }
  .swatch-row button:hover { transform: scale(1.15); }
  .swatch-row button.sel { border-color: #0f172a; }
  .pill .ticon { font-size: 19px; margin-right: 5px; }
  .splash .sp-icon { font-size: 60px; line-height: 1; }

  /* Wildcards */
  .wc-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
    margin-bottom: 20px; }
  .wc-btn { color:#fff; border:none; border-radius:10px; padding: 12px 18px;
    font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
    transition: filter 0.15s, box-shadow 0.15s; }
  .wc-btn:hover { filter: brightness(1.12); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .wc-btn small { display:block; font-weight:500; font-size:11px; opacity:0.92;
    margin-top:2px; }
  .pill .wc { display:block; font-size: 13px; font-weight: 600; margin-top: 2px; }
  .wc-badge { background:#fef3c7; color:#92400e; border-radius:8px;
    padding: 4px 10px; font-size: 13px; font-weight:700; margin-left: 8px; }

  .footer { color:#888; font-size: 11px; text-align:center; margin-top: 24px; line-height: 1.5; }
  .err { color: var(--red); background: var(--red-bg); border-left: 4px solid var(--red);
    padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 14px; }

  @media (max-width: 560px) {
    .app { padding: 12px 12px 50px; }
    .card { padding: 16px; }
    .grid2 { grid-template-columns: 1fr; }
    .qtext { font-size: 16px; }
    .bchoice { font-size: 15px; padding: 12px 13px; }
    .pill { font-size: 14px; min-width: 100px; padding: 6px 12px; }
    .splash h2 { font-size: 26px; }
  }
</style>
</head>

    <h1>Team Battle</h1>
    <p class="muted" style="text-align:center;">⚔ Team Battle — set up the match, then take turns on this screen.</p>
    <hr style="border:none; border-top:1px solid var(--border); margin: 18px 0;">

    <div class="grid2">
      <div>
        <label class="fld">Number of teams</label>
        <select id="s-teams">
          <option value="2" selected>2 teams</option>
          <option value="3">3 teams</option>
        </select>
      </div>
      <div>
        <label class="fld">Time per question (seconds, 0 = none)</label>
        <input type="number" id="s-time" value="30" min="0" max="300">
      </div>
    </div>

    <div id="teams-host"></div>

    <label class="fld">Questions per team</label>
    <input type="number" id="s-qper" value="5" min="1" max="50">
    <div class="muted" id="s-pool" style="margin-top:6px;"></div>

    <div class="check-row">
      <input type="checkbox" id="s-streak" checked>
      <label for="s-streak">🔥 Streak bonus — 2+ correct in a row earns +1 extra point</label>
    </div>

    <label class="fld" style="margin-top:18px;">Wildcards (each team gets one of each enabled type)</label>
    <div id="s-wildcards"></div>

function _b64dec(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
function _decode() {
  const c = _b64dec(__B_CIPHER), k = _b64dec(__B_KEY);
  const p = new Uint8Array(c.length);
  for (let i = 0; i < c.length; i++) p[i] = c[i] ^ k[i % k.length];

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function renderRich(html) {
  if (!html) return "";
  let s = html;
  if (/^\s*<!doctype|^\s*<html/i.test(s)) {
    const m = s.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    if (m) s = m[1];
  }
  s = s.replace(/font-family\s*:\s*[^;'"<>]+;?/gi, '')
       .replace(/font-size\s*:\s*[\d.]+\s*(?:pt|px|em|rem|%)\s*;?/gi, '');
  return s;
}
function stripHtml(h) {
  if (!h) return '';
  return h.replace(/<[^>]+>/g, '').replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();
}

// ── Setup → sequence ─────────────────────────────────────────────────
function startBattle() {
  numTeams  = parseInt(document.getElementById('s-teams').value, 10);
  timePerQ  = Math.max(0, parseInt(document.getElementById('s-time').value, 10) || 0);
  qPerTeam  = Math.max(1, parseInt(document.getElementById('s-qper').value, 10) || 5);
  streakBonus = document.getElementById('s-streak').checked;
  names = []; icons = []; teamColors = [];
  for (let t = 0; t < numTeams; t++) {
    names.push((teamCfg[t].name || '').trim() || ('Team ' + (t + 1)));
    icons.push(teamCfg[t].icon || '⚔');
    teamColors.push(teamCfg[t].color || ACCENT[t] || '#2563eb');
  }
  const err = document.getElementById('s-err');
  if (POOL.length === 0) {
    err.textContent = 'This file contains no MCQ questions.';
    err.classList.remove('hidden');
    return;
  }
  const needed = numTeams * qPerTeam;
  if (needed > POOL.length &&
      !confirm('This battle needs ' + needed + ' questions but the pool has only '
               + POOL.length + '. Some questions will repeat. Continue?')) {
    return;
  }
  err.classList.add('hidden');

  // Round-robin sequence with disjoint per-team slices (repeat-fill if short)
  let all = shuffle(POOL.slice());
  while (all.length < needed) all = all.concat(shuffle(POOL.slice()));
  const perTeam = [];
  for (let t = 0; t < numTeams; t++) perTeam.push(all.slice(t * qPerTeam, (t + 1) * qPerTeam));
  seq = [];
  for (let qi = 0; qi < qPerTeam; qi++)
    for (let t = 0; t < numTeams; t++)
      seq.push([t, perTeam[t][qi]]);

  scores = new Array(numTeams).fill(0);
  streaks = new Array(numTeams).fill(0);
  freezeNext = new Array(numTeams).fill(false);
  // One of each enabled wildcard per team. Freeze is useless with no timer —
  // drop it so a team can't waste the pick (mirrors the desktop rule).
  let enabled = WILDCARDS.filter(w => document.getElementById('s-wc-' + w.id).checked)
                         .map(w => w.id);
  if (timePerQ <= 0) enabled = enabled.filter(id => id !== 'freeze');
  wcInventory = [];
  for (let t = 0; t < numTeams; t++) {
    const inv = {};
    enabled.forEach(id => { inv[id] = 1; });
    wcInventory.push(inv);
  }
  cur = 0;
  battleActive = true;

  document.getElementById('setup').classList.add('hidden');
  showSplash(0);
}

// ── Splash ───────────────────────────────────────────────────────────
function showSplash(team) {
  document.getElementById('game').classList.add('hidden');
  activeWc = null;              // wildcards apply to one question only
  secondChanceUsed = false;
  const sp = document.getElementById('splash');
  document.getElementById('sp-icon').textContent = icons[team] || '⚔';
  document.getElementById('sp-name').textContent = names[team] + "'s Turn!";
  document.getElementById('sp-name').style.color = teamColors[team];
  document.getElementById('sp-score').textContent = "Current score: " + scores[team];

  // Wildcard buttons for whatever this team still holds
  const row = document.getElementById('sp-wc-row');
  const hdr = document.getElementById('sp-wc-hdr');
  row.innerHTML = '';
  const held = WILDCARDS.filter(w => (wcInventory[team] || {})[w.id] > 0);
  hdr.classList.toggle('hidden', held.length === 0);
  held.forEach(w => {
    const b = document.createElement('button');
    b.className = 'wc-btn';
    b.style.background = w.color;
    b.title = w.desc;
    b.innerHTML = w.emoji + ' ' + w.label + '<small>' + w.desc + '</small>';
    b.addEventListener('click', () => {
      wcInventory[team][w.id] -= 1;
      if (wcInventory[team][w.id] <= 0) delete wcInventory[team][w.id];
      activeWc = w.id;
      showQuestion();
    });
    row.appendChild(b);
  });
  document.getElementById('sp-go').textContent =
    held.length ? '➔ Skip — no wildcard this turn' : 'Ready — show the question →';
  sp.classList.remove('hidden');
}

// ── Question ─────────────────────────────────────────────────────────
function currentTeam() { return seq[cur][0]; }
function currentQ()    { return seq[cur][1]; }

function renderPills() {
  const host = document.getElementById('pills');
  host.innerHTML = '';
  for (let t = 0; t < numTeams; t++) {
    const d = document.createElement('div');
    d.className = 'pill' + (t === currentTeam() ? ' active' : '');
    d.style.background = teamColors[t];
    const held = WILDCARDS.filter(w => (wcInventory[t] || {})[w.id] > 0)
                          .map(w => w.emoji).join(' ');
    d.innerHTML = '<span class="ticon">' + icons[t] + '</span>' + names[t] + ': ' + scores[t] +
      (streakBonus && streaks[t] >= 2
        ? '<span class="streak">🔥 ' + streaks[t] + ' in a row</span>' : '') +
      (held ? '<span class="wc">' + held + '</span>' : '');
    host.appendChild(d);
  }
}

function showQuestion() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  answered = false;
  selectedIdx = -1;
  document.getElementById('feedback').classList.add('hidden');
  const sb = document.getElementById('submit-btn');
  sb.disabled = false;
  sb.textContent = 'Submit Answer';

  const t = currentTeam(), q = currentQ();
  renderPills();
  const banner = document.getElementById('turn-banner');
  const wcDef = activeWc ? WILDCARDS.find(w => w.id === activeWc) : null;
  banner.innerHTML = icons[t] + ' ' + names[t] + "'s Turn" +
    (wcDef ? ' <span class="wc-badge">' + wcDef.emoji + ' ' + wcDef.label + '</span>' : '');
  banner.style.background = teamColors[t];

  const teamQNum = seq.slice(0, cur + 1).filter(x => x[0] === t).length;
  document.getElementById('q-progress').textContent =
    'Question ' + teamQNum + ' of ' + qPerTeam;

  document.getElementById('q-text').innerHTML = renderRich(q.text || '');

  const host = document.getElementById('choices');
  host.innerHTML = '';
  (q.choices || []).forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'bchoice';
    b.innerHTML = renderRich(c.text || '');
    b.addEventListener('click', () => {
      if (answered) return;
      selectedIdx = i;
      host.querySelectorAll('.bchoice').forEach(el => el.classList.remove('selected'));
      b.classList.add('selected');
    });
    host.appendChild(b);
  });

  startTimer();
}

// ── Timer ────────────────────────────────────────────────────────────
function startTimer() {
  stopTimer();
  const el = document.getElementById('timer');
  if (timePerQ <= 0) { el.classList.add('hidden'); return; }
  const t = currentTeam();
  let base = timePerQ;
  let frozen = false;
  if (freezeNext[t]) {
    base = Math.max(5, Math.floor(base / 2));
    freezeNext[t] = false;
    frozen = true;
  }
  timerRem = base;
  const suffix = frozen ? ' ❄' : '';
  el.textContent = '⏱ ' + timerRem + 's' + suffix;
  el.classList.remove('hidden', 'warn');
  timer = setInterval(() => {
    timerRem--;
    el.textContent = '⏱ ' + timerRem + 's' + suffix;
    el.classList.toggle('warn', timerRem <= 5);
    if (timerRem <= 0) { stopTimer(); record(true); }
  }, 1000);
}
function stopTimer() {
  if (timer) { clearInterval(timer); timer = null; }
}

// ── Scoring ──────────────────────────────────────────────────────────
function onSubmit() {
  if (answered) return;
  record(false);
}

function correctHint(q) {
  const texts = (q.choices || []).filter(c => c.correct).map(c => stripHtml(c.text || ''));
  return texts.length ? ('  Correct: ' + texts.join(' / ')) : '';
}

function record(timedOut) {
  stopTimer();
  answered = true;
  const sb = document.getElementById('submit-btn');
  sb.disabled = true;
  const t = currentTeam(), q = currentQ();
  const fb = document.getElementById('feedback');
  const wc = activeWc;
  const isCorrect = !timedOut && selectedIdx >= 0 && !!(q.choices[selectedIdx] || {}).correct;

  // Second Chance retry — BEFORE any reveal. No correct-answer hint here:
  // showing the answer and then allowing a retry would be a free point.
  if (!timedOut && !isCorrect && wc === 'second' && !secondChanceUsed) {
    secondChanceUsed = true;
    answered = false;
    sb.disabled = false;
    sb.textContent = 'Try Again!';
    fb.className = 'feedback retry';
    fb.textContent = '🔄 Wrong — Second Chance!  Answer again to earn the point.';
    fb.classList.remove('hidden');
    startTimer();   // fresh timer for the retry
    return;
  }

  // Final outcome — now it's safe to reveal the marks
  const correctIdx = (q.choices || []).findIndex(c => c.correct);
  const btns = document.querySelectorAll('#choices .bchoice');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    else if (i === selectedIdx && !timedOut) b.classList.add('wrong');
  });

  // Freeze targets the highest-scoring opponent, on any outcome
  function highestOpponent() {
    let target = -1, best = -1;
    for (let o = 0; o < numTeams; o++)
      if (o !== t && scores[o] > best) { best = scores[o]; target = o; }
    return target;
  }
  function applyFreeze() {
    if (wc === 'freeze' && timePerQ > 0) {
      const target = highestOpponent();
      if (target >= 0) freezeNext[target] = true;
    }
  }
  const freezeNote = (wc === 'freeze' && timePerQ > 0)
    ? "  ❄ Opponent's timer frozen!" : '';

  let msg = '', cls = '';
  if (timedOut) {
    applyFreeze();
    if (wc !== 'shield') streaks[t] = 0;
    cls = 'timeout';
    msg = "⏱ Time's up! No point for " + names[t] + '.' + correctHint(q) + freezeNote;
  } else if (isCorrect) {
    let earned = (wc === 'double') ? 2 : 1;
    streaks[t] += 1;
    let extra = (wc === 'double') ? '  ⭐ Double points!' :
                (wc === 'steal')  ? '  🎯 Steal!' : freezeNote;
    if (wc === 'steal') {
      const target = highestOpponent();
      if (target >= 0 && scores[target] > 0) scores[target] -= 1;
    }
    applyFreeze();
    let streakMsg = '';
    if (streakBonus && streaks[t] >= 2) { earned += 1; streakMsg = '  🔥 Streak +1'; }
    scores[t] += earned;
    cls = 'good';
    msg = '✔ Correct!  +' + earned + ' for ' + names[t] + extra + streakMsg;
  } else if (wc === 'second' && secondChanceUsed) {
    // The retry was also wrong
    streaks[t] = 0;
    cls = 'bad';
    msg = '✗ Wrong again.  No point for ' + names[t] + '.' + correctHint(q);
  } else {
    const shieldMsg = (wc === 'shield') ? '  🛡 Streak preserved!' : '';
    if (wc !== 'shield') streaks[t] = 0;
    applyFreeze();
    cls = 'bad';
    msg = (selectedIdx < 0 ? '✗ No answer selected. ' : '✗ Wrong! ')
        + 'No point for ' + names[t] + '.' + correctHint(q) + shieldMsg + freezeNote;
  }

  renderPills();
  fb.className = 'feedback ' + cls;
  fb.textContent = msg;
  fb.classList.remove('hidden');

  if (isOutcomeDecided()) {
    const leader = scores.indexOf(Math.max(...scores));
    setTimeout(() => {
      fb.className = 'feedback early';
      fb.textContent = '🏆 ' + names[leader] + ' cannot be caught — battle over!';
      setTimeout(finish, 2000);
    }, 2200);
  } else {
    setTimeout(advance, 2400);
  }
}

// Mirrors the desktop logic incl. the streak-aware catch-up bound.
function isOutcomeDecided() {
  // Wildcards can grant >1 pt per question (Double, Steal) — never call the
  // battle early while any team still holds one.
  if (wcInventory.some(inv => Object.keys(inv).length > 0)) return false;
  const maxScore = Math.max(...scores);
  if (maxScore === 0) return false;
  const leaders = scores.filter(s => s === maxScore).length;
  if (leaders !== 1) return false;
  const remaining = new Array(numTeams).fill(0);
  for (let i = cur + 1; i < seq.length; i++) remaining[seq[i][0]]++;
  if (!remaining.some(r => r > 0)) return false;
  const perQMax = streakBonus ? 2 : 1;
  for (let t = 0; t < numTeams; t++) {
    if (scores[t] < maxScore && scores[t] + remaining[t] * perQMax >= maxScore) return false;
  }
  return true;
}

function advance() {
  cur++;
  if (cur >= seq.length) { finish(); return; }
  if (seq[cur][0] !== seq[cur - 1][0]) showSplash(seq[cur][0]);
  else showQuestion();
}

// ── Results ──────────────────────────────────────────────────────────
function finish() {
  battleActive = false;
  document.getElementById('game').classList.add('hidden');
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  const maxScore = Math.max(...scores);
  const winners = [];
  scores.forEach((s, t) => { if (s === maxScore) winners.push(t); });
  document.getElementById('r-title').textContent =
    winners.length > 1 ? "🤝 It's a Tie!" : ('🏆 ' + names[winners[0]] + ' Wins!');

  const ranked = scores.map((s, t) => [t, s]).sort((a, b) => b[1] - a[1]);
  const medals = ['🥇', '🥈', '🥉'];
  const maxPossible = Math.max(1, qPerTeam * (streakBonus ? 2 : 1));
  const host = document.getElementById('r-cards');
  host.innerHTML = '';
  ranked.forEach(([t, s], rank) => {
    const card = document.createElement('div');
    card.className = 'rescard' + (s === maxScore ? ' winner' : '');
    card.style.borderColor = s === maxScore ? teamColors[t] : 'var(--border)';
    card.innerHTML =
      '<div class="medal">' + (medals[rank] || '') + '</div>' +
      '<div class="tname" style="color:' + teamColors[t] + '">' + icons[t] + ' ' + names[t] + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' +
        Math.min(100, Math.round(100 * s / maxPossible)) + '%; background:' + teamColors[t] + '"></div></div>' +
      '<div class="tscore" style="color:' + teamColors[t] + '">' + s + '</div>';
    host.appendChild(card);
  });
}
</script>
